schema_version: "1.0"
enabled: false
official_objectives:
  browse_search_success_minimum: 0.995
  storefront_p95_seconds_maximum_exclusive: 1.0
  cart_success_minimum: 0.995
  checkout_success_minimum: 0.99
queries:
  - query_id: browse_search_success_ratio_24h
    source_adapter: prometheus
    mode: range
    window: 24h
    unit: ratio
    result_shape: scalar
    status: unqualified
    expression: |
      sum(rate(traces_span_metrics_calls_total{service_name="frontend", span_kind="SPAN_KIND_SERVER", status_code!="STATUS_CODE_ERROR"}[24h]))
      /
      clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="frontend", span_kind="SPAN_KIND_SERVER"}[24h])), 0.001)
  - query_id: storefront_p95_seconds_24h
    source_adapter: prometheus
    mode: range
    window: 24h
    unit: seconds
    result_shape: scalar
    status: unqualified
    expression: |
      histogram_quantile(
        0.95,
        sum(rate(traces_span_metrics_duration_milliseconds_bucket{service_name="frontend", span_kind="SPAN_KIND_SERVER"}[24h])) by (le)
      ) / 1000
  - query_id: cart_success_ratio_24h
    source_adapter: prometheus
    mode: range
    window: 24h
    unit: ratio
    result_shape: scalar
    status: unqualified
    expression: |
      sum(rate(traces_span_metrics_calls_total{service_name="cart", span_kind="SPAN_KIND_SERVER", status_code!="STATUS_CODE_ERROR"}[24h]))
      /
      clamp_min(sum(rate(traces_span_metrics_calls_total{service_name="cart", span_kind="SPAN_KIND_SERVER"}[24h])), 0.001)
  - query_id: checkout_success_ratio_24h
    source_adapter: prometheus
    mode: range
    window: 24h
    unit: ratio
    result_shape: scalar
    status: unqualified
    expression: |
      sum(rate(rpc_server_duration_milliseconds_count{service_name="checkout", rpc_method="PlaceOrder", rpc_grpc_status_code="0"}[24h]))
      /
      clamp_min(sum(rate(rpc_server_duration_milliseconds_count{service_name="checkout", rpc_method="PlaceOrder"}[24h])), 0.001)

