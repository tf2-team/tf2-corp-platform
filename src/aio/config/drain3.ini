[PROFILING]
enabled = false
report_sec = 60

[SNAPSHOT]
snapshot_interval_minutes = 5
compress_state = true

[DRAIN]
sim_th = 0.4
depth = 4
max_children = 100
max_clusters = 1000
extra_delimiters = ["_", "-", ":", "/", "=", "&", "?"]
parametrize_numeric_tokens = true

[MASKING]
mask_prefix = <
mask_suffix = >
parameter_extraction_cache_capacity = 3000
masking = [{"regex_pattern":"(?i)\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b","mask_with":"UUID"},{"regex_pattern":"(?i)\\b(?:trace_id|traceid|span_id|spanid|request_id|requestid|correlation_id|order_id|order|session_id|user_id|token|pod|container_id)=['\\\"]?[^\\s,'\\\"]+","mask_with":"KV_ID"},{"regex_pattern":"(?i)\\b[0-9a-f]{16,32}\\b","mask_with":"HEX_ID"},{"regex_pattern":"\\b\\d{1,3}(?:\\.\\d{1,3}){3}\\b","mask_with":"IP"},{"regex_pattern":"https?://[^\\s,'\\\"]+","mask_with":"URL"},{"regex_pattern":"\\b\\d+(?:\\.\\d+)?(?:ms|s|us|ns)\\b","mask_with":"DURATION"},{"regex_pattern":"[a-z0-9]([-a-z0-9]*[a-z0-9])?-[0-9a-f]{8,10}-[a-z0-9]{5}\\b","mask_with":"POD_NAME"}]
