name: CI

on:
  pull_request:
    branches: [main, techx-dev-corp]
  # Called by build-and-push.yml so lint/unit tests gate image publishing.
  # Standalone branch-push trigger removed to avoid duplicated CI runs.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go@v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.24.x"
          cache-dependency-path: internal/tools/go.sum

      - name: Setup Node
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Install npm tools
        run: npm ci

      - name: Misspell
        run: make misspell

      - name: License headers
        run: make checklicense

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: checkout (Go)
            kind: go
            workdir: src/checkout
          - name: product-catalog (Go)
            kind: go
            workdir: src/product-catalog
          - name: cart (.NET)
            kind: dotnet
            workdir: src/cart
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        if: matrix.kind == 'go'
        # actions/setup-go@v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.24.x"
          cache-dependency-path: ${{ matrix.workdir }}/go.sum

      - name: Setup .NET
        if: matrix.kind == 'dotnet'
        # actions/setup-dotnet@v5.4.0
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "10.0.x"

      - name: Go test
        if: matrix.kind == 'go'
        working-directory: ${{ matrix.workdir }}
        run: go test ./...

      - name: .NET test
        if: matrix.kind == 'dotnet'
        working-directory: ${{ matrix.workdir }}
        run: dotnet test --configuration Release --verbosity minimal
