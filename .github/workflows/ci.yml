name: CI

on:
  pull_request:
    branches: [main, techx-dev-corp]
  # Called by build-and-push.yml so lint/unit tests gate image publishing.
  # Standalone branch-push trigger removed to avoid duplicated CI runs.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        # actions/setup-go@v5.6.0
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.24.x"
          cache-dependency-path: internal/tools/go.sum

      - name: Setup Node
        # actions/setup-node@v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install npm tools
        run: npm ci

      - name: Misspell
        run: make misspell

      - name: License headers
        run: make checklicense

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: checkout (Go)
            kind: go
            workdir: src/checkout
          - name: product-catalog (Go)
            kind: go
            workdir: src/product-catalog
          - name: cart (.NET)
            kind: dotnet
            workdir: src/cart
    steps:
      - name: Checkout
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        if: matrix.kind == 'go'
        # actions/setup-go@v5.6.0
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.24.x"
          cache-dependency-path: ${{ matrix.workdir }}/go.sum

      - name: Setup .NET
        if: matrix.kind == 'dotnet'
        # actions/setup-dotnet@v4.3.1
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Go test
        if: matrix.kind == 'go'
        working-directory: ${{ matrix.workdir }}
        run: go test ./...

      - name: .NET test
        if: matrix.kind == 'dotnet'
        working-directory: ${{ matrix.workdir }}
        run: dotnet test --configuration Release --verbosity minimal
