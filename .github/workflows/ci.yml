name: CI

on:
  pull_request:
    branches: [main, techx-dev-corp]
  # Called by build-and-push.yml so lint/unit tests gate image publishing.
  # Standalone branch-push trigger removed to avoid duplicated CI runs.
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Go
        # actions/setup-go@v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25.x"
          cache-dependency-path: internal/tools/go.sum

      - name: Setup Node
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Install npm tools
        run: npm ci

      - name: Misspell
        run: make misspell

      - name: License headers
        run: make checklicense

      - name: Enforce digest-pinned Dockerfile base images
        run: python3 scripts/check_pinned_base_images.py

      - name: Release catalog consistency
        run: python3 scripts/check_release_catalog.py

      - name: Secure delivery script tests
        run: python3 scripts/test_secure_delivery_scripts.py

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: checkout (Go)
            kind: go
            workdir: src/checkout
          - name: product-catalog (Go)
            kind: go
            workdir: src/product-catalog
          - name: cart (.NET)
            kind: dotnet
            workdir: src/cart
          - name: mem0 (Python)
            kind: python
            workdir: src/mem0
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive

      - name: Setup Go
        if: matrix.kind == 'go'
        # actions/setup-go@v6.5.0
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25.x"
          cache-dependency-path: ${{ matrix.workdir }}/go.sum

      - name: Setup .NET
        if: matrix.kind == 'dotnet'
        # actions/setup-dotnet@v5.4.0
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        if: matrix.kind == 'python'
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/mem0/requirements-production.txt

      - name: Install Python dependencies
        if: matrix.kind == 'python'
        run: python -m pip install -r src/mem0/requirements-production.txt

      - name: Go test
        if: matrix.kind == 'go'
        working-directory: ${{ matrix.workdir }}
        run: go test ./...

      - name: .NET test
        if: matrix.kind == 'dotnet'
        working-directory: ${{ matrix.workdir }}
        run: dotnet test --configuration Release --verbosity minimal

      - name: Python test
        if: matrix.kind == 'python'
        run: python -m unittest discover -s src/mem0/tests -v

  # ---------------------------------------------------------------------------
  # PR-only: bake changed release images locally (no ECR login, no --push).
  # Catches Dockerfile/context compile failures before merge. Skipped on
  # workflow_call (publish path already bakes multi-arch with push).
  # ---------------------------------------------------------------------------
  prepare-pr-images:
    name: Prepare PR image builds
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      build_services: ${{ steps.classify.outputs.build_services }}
      build_count: ${{ steps.classify.outputs.build_count }}
      mode: ${{ steps.classify.outputs.mode }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Classify services to bake
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Canonical release set (shared with publish / scripts/release_services.json).
          RELEASE_JSON="$(jq -c '.' scripts/release_services.json)"
          mapfile -t RELEASE < <(printf '%s' "${RELEASE_JSON}" | jq -r '.[]')
          declare -A IS_RELEASE=()
          for s in "${RELEASE[@]}"; do
            IS_RELEASE["${s}"]=1
          done

          MODE="none"
          REASON="no image-affecting paths in PR"
          declare -A BUILD_SET=()
          FULL_TRIGGER=0

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "::error::PR base SHA ${BASE_SHA} not in fetch history"
            exit 1
          fi
          if ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            echo "::error::PR head SHA ${HEAD_SHA} not in fetch history"
            exit 1
          fi

          mapfile -t CHANGED < <(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | sort -u)
          echo "Changed files (${#CHANGED[@]}):"
          printf '  %s\n' "${CHANGED[@]}"

          for f in "${CHANGED[@]}"; do
            case "${f}" in
              # Match publish classification: compose/bake catalog edits alone do not
              # force a full PR bake matrix (new services bake selectively).
              pb/*|buildkitd.toml|.env|.gitmodules)
                FULL_TRIGGER=1
                echo "Full rebuild trigger: ${f}"
                ;;
              docker-compose.yml|docker-bake.hcl)
                echo "Catalog/definition change (selective; not a full-bake trigger): ${f}"
                ;;
              third-party/mem0|third-party/mem0/*)
                BUILD_SET["mem0"]=1
                echo "Service change: mem0 (${f})"
                ;;
              src/*)
                rest="${f#src/}"
                svc="${rest%%/*}"
                if [[ -n "${svc}" && -n "${IS_RELEASE[${svc}]+x}" ]]; then
                  BUILD_SET["${svc}"]=1
                  echo "Service change: ${svc} (${f})"
                else
                  echo "Non-release src path (no bake): ${f}"
                fi
                ;;
              *)
                echo "Non-image path (ignored): ${f}"
                ;;
            esac
          done

          BUILD_LIST=()
          if [[ "${FULL_TRIGGER}" -eq 1 ]]; then
            MODE="full"
            REASON="shared/global image path changed"
            BUILD_LIST=("${RELEASE[@]}")
          elif [[ "${#BUILD_SET[@]}" -gt 0 ]]; then
            MODE="selective"
            REASON="path-based selective PR image build"
            for s in "${RELEASE[@]}"; do
              if [[ -n "${BUILD_SET[${s}]+x}" ]]; then
                BUILD_LIST+=("${s}")
              fi
            done
          fi

          BUILD_JSON="$(printf '%s\n' "${BUILD_LIST[@]+"${BUILD_LIST[@]}"}" | jq -R . | jq -s -c .)"
          if [[ "${#BUILD_LIST[@]}" -eq 0 ]]; then
            BUILD_JSON='[]'
          fi

          {
            echo "build_services=${BUILD_JSON}"
            echo "build_count=${#BUILD_LIST[@]}"
            echo "mode=${MODE}"
            echo "reason=${REASON}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## PR image build plan"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Mode | \`${MODE}\` |"
            echo "| Reason | ${REASON} |"
            echo "| Build count | ${#BUILD_LIST[@]} |"
            echo "| Services | \`${BUILD_JSON}\` |"
            echo ""
            echo "Local bake only (linux/amd64, no ECR login, no \`--push\`)."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "mode=${MODE} count=${#BUILD_LIST[@]} reason=${REASON}"
          echo "services=${BUILD_JSON}"

  build-pr-images:
    name: Build ${{ matrix.service }} (PR local)
    needs: [prepare-pr-images]
    if: >
      github.event_name == 'pull_request' &&
      needs.prepare-pr-images.outputs.build_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.prepare-pr-images.outputs.build_services) }}
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4.2.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
          buildkitd-config: ./buildkitd.toml

      - name: Bake service (local only, no push)
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          # Load Dockerfile paths and build args from committed .env.
          # Do NOT source .env.override. Do NOT use real ECR IMAGE_NAME.
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a

          export IMAGE_NAME="local.invalid/pr-check"
          export DEMO_VERSION="pr-local"
          export IMAGE_VERSION="pr-local"

          echo "PR local bake service=${SERVICE}"
          echo "  IMAGE_NAME=${IMAGE_NAME}"
          echo "  DEMO_VERSION=${DEMO_VERSION}"
          echo "  platform=linux/amd64 (PR validation only)"
          echo "  cache=disabled (no ECR)"
          echo "  output=type=cacheonly (no load/push)"

          # Overrides:
          # - single platform for PR speed (publish path still multi-arch)
          # - clear cache-from/to (bake defaults to GHA type=gha; not needed for PR gate)
          # - cacheonly validates the full Dockerfile build without exporting layers
          docker buildx bake \
            -f docker-compose.yml \
            -f docker-bake.hcl \
            "${SERVICE}" \
            --set "*.platform=linux/amd64" \
            --set "*.cache-from=" \
            --set "*.cache-to=" \
            --set "*.tags=${IMAGE_NAME}/${SERVICE}:${DEMO_VERSION}" \
            --set "*.output=type=cacheonly"

      - name: Job summary
        if: always()
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          {
            echo "## PR local build ${SERVICE}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Service | \`${SERVICE}\` |"
            echo "| Platform | \`linux/amd64\` |"
            echo "| Push | no |"
            echo "| ECR | not used |"
          } >> "${GITHUB_STEP_SUMMARY}"

  # Stable required-check name for branch protection (not matrix-expanded).
  pr-image-build:
    name: PR image build
    if: always() && github.event_name == 'pull_request'
    needs: [prepare-pr-images, build-pr-images]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate PR image build result
        env:
          PREPARE_RESULT: ${{ needs.prepare-pr-images.result }}
          BUILD_RESULT: ${{ needs.build-pr-images.result }}
          BUILD_COUNT: ${{ needs.prepare-pr-images.outputs.build_count }}
          MODE: ${{ needs.prepare-pr-images.outputs.mode }}
          REASON: ${{ needs.prepare-pr-images.outputs.reason }}
        run: |
          set -euo pipefail
          echo "prepare=${PREPARE_RESULT} build=${BUILD_RESULT} count=${BUILD_COUNT} mode=${MODE}"
          echo "reason=${REASON}"

          if [[ "${PREPARE_RESULT}" != "success" ]]; then
            echo "::error::Prepare PR image builds failed (${PREPARE_RESULT})"
            exit 1
          fi

          # build-pr-images is skipped when no image-affecting paths changed.
          if [[ "${BUILD_RESULT}" == "failure" || "${BUILD_RESULT}" == "cancelled" ]]; then
            echo "::error::PR local image bake failed (${BUILD_RESULT})"
            exit 1
          fi

          if [[ "${BUILD_RESULT}" != "success" && "${BUILD_RESULT}" != "skipped" ]]; then
            echo "::error::Unexpected build-pr-images result: ${BUILD_RESULT}"
            exit 1
          fi

          {
            echo "## PR image build gate"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Prepare | \`${PREPARE_RESULT}\` |"
            echo "| Build matrix | \`${BUILD_RESULT}\` |"
            echo "| Build count | \`${BUILD_COUNT}\` |"
            echo "| Mode | \`${MODE}\` |"
            echo "| Reason | ${REASON} |"
            echo "| ECR push | no |"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "PR image build gate passed (local bake only; nothing pushed to ECR)."

  semgrep-sast:
    name: Semgrep SAST
    # Publish path re-runs SAST in build-and-push; skip on workflow_call to avoid duplicate cost.
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install pinned Semgrep
        run: python3 -m pip install --disable-pip-version-check 'semgrep==1.136.0'
      - name: Run blocking SAST rules
        env:
          BASELINE_COMMIT: ${{ github.event.pull_request.base.sha }}
        run: >-
          semgrep scan --error --metrics=off
          --baseline-commit "${BASELINE_COMMIT}"
          --config p/ci --config p/owasp-top-ten src

  trufflehog-secrets:
    name: TruffleHog secrets
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install pinned TruffleHog with checksum verification
        env:
          TRUFFLEHOG_VERSION: 3.90.8
        run: |
          set -euo pipefail
          base="https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}"
          archive="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error -o "/tmp/${archive}" "${base}/${archive}"
          curl --fail --location --silent --show-error -o /tmp/trufflehog_checksums.txt "${base}/trufflehog_${TRUFFLEHOG_VERSION}_checksums.txt"
          grep " ${archive}$" /tmp/trufflehog_checksums.txt | sed 's#  #  /tmp/#' | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /tmp trufflehog
          sudo install -m 0755 /tmp/trufflehog /usr/local/bin/trufflehog
      - name: Scan repository history for verified secrets
        run: trufflehog git "file://${GITHUB_WORKSPACE}" --fail --only-verified --no-update

  trivy-iac-scan:
    name: Trivy IaC misconfiguration
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Block HIGH and CRITICAL IaC misconfigurations
        # aquasecurity/trivy-action@v0.36.0
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          version: v0.69.3
          scan-type: config
          scan-ref: .
          skip-dirs: node_modules
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  product-reviews-tests:
    name: Product reviews tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/product-reviews/requirements.txt
            src/product-reviews/requirements-dev.txt
            src/ai-common/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -r src/product-reviews/requirements-dev.txt

      - name: Validate spaCy model
        run: python -c "import spacy; spacy.load('en_core_web_lg')"

      - name: Run product reviews tests
        run: python -m pytest src/product-reviews/tests -v

      # Production receives this model as an external, read-only cache rather
      # than baking weights into the application image. Build the exact pinned
      # artifact here so a missing/corrupt model blocks the PR before merge.
      - name: Build and validate pinned guardrail model artifact
        run: >-
          python src/product-reviews/scripts/build_model_artifact.py
          --output "${RUNNER_TEMP}/ai-model"

      - name: Validate strict guardrail startup from offline artifact
        env:
          HF_HOME: ${{ runner.temp }}/ai-model/huggingface
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          AI_GUARDRAIL_REQUIRE_MODEL: "true"
          PYTHONPATH: src/product-reviews
        run: python -c "import guardrails; guardrails.initialize_guardrails()"

  shopping-copilot-tests:
    name: Shopping copilot tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/ai-common/pyproject.toml
            src/shopping-copilot/requirements.txt

      - name: Install dependencies
        run: >-
          python -m pip install ./src/ai-common
          -r src/shopping-copilot/requirements.txt pytest==9.1.1

      - name: Run shopping copilot tests
        env:
          AI_GUARDRAIL_REQUIRE_MODEL: "false"
          PYTHONPATH: src/shopping-copilot
        run: python -m pytest src/shopping-copilot/tests -v

      - name: Validate shared guardrail dependency
        run: >-
          python -c "from llm_guard.input_scanners import PromptInjection; from techx_ai_common import guardrails"
# Change trail: @hungxqt - 2026-07-20 - Bump setup-go to 1.25.x to match checkout/product-catalog go.mod
