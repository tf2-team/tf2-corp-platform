name: CI

on:
  pull_request:
    branches: [main, techx-dev-corp]
  push:
    branches: [main, techx-dev-corp]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: internal/tools/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm tools
        run: npm ci

      - name: Misspell
        run: make misspell

      - name: License headers
        run: make checklicense

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: checkout (Go)
            kind: go
            workdir: src/checkout
          - name: product-catalog (Go)
            kind: go
            workdir: src/product-catalog
          - name: cart (.NET)
            kind: dotnet
            workdir: src/cart
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.kind == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: ${{ matrix.workdir }}/go.sum

      - name: Setup .NET
        if: matrix.kind == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Go test
        if: matrix.kind == 'go'
        working-directory: ${{ matrix.workdir }}
        run: go test ./...

      - name: .NET test
        if: matrix.kind == 'dotnet'
        working-directory: ${{ matrix.workdir }}
        run: dotnet test --configuration Release --verbosity minimal
