name: Build and push images

# Job graph: CI → prepare → AWS/ECR preflight
#            → build matrix (BUILD_SET only)
#            → verify ECR → security scans → sign/SBOM/attest
#            → publish Mem0 FastEmbed artifact (only when mem0 is in BUILD_SET)
#            → release-ready → update-chart-dev (development) | create-chart-prod-pr (production)
#
# Immutable digest contract: unchanged services keep their existing digest overlays.
# Only BUILD_SET is built, scanned, signed, attested, resolved, and promoted.
# mem0 is a normal matrix service; compose/bake catalog edits alone do not force full bake.
# Dev: after release-ready, direct-push only rebuilt services under service-digest/values-<service>.yaml.
# Prod: after release-ready, open a PR containing only rebuilt service digests under service-digest/.

on:
  push:
    branches: [main, techx-dev-corp]
    # Branch pushes: only when image-affecting paths change.
    # A path-filtered run publishes only services selected into BUILD_SET.
    # Tag pushes (v*) and workflow_dispatch always run (no path filter on those entry points).
    paths:
      - "src/**"
      - "third-party/mem0"
      - ".gitmodules"
      - "pb/**"
      - "docker-compose.yml"
      - "docker-bake.hcl"
      - "buildkitd.toml"
      - ".env"
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target GitHub Environment (maps to ECR via environment variables)
        required: true
        type: choice
        options:
          - development
          - production
      requested_services:
        description: Comma/space-separated release services to rebuild selectively
        required: false
        type: string
        default: ""
      requested_services_reason:
        description: Required justification when requested_services is non-empty
        required: false
        type: string
        default: ""
      force_full_rebuild:
        description: Bake all 23 services from source (ignore selective rebuild; reason required)
        required: false
        type: boolean
        default: false
      full_rebuild_reason:
        description: Required justification when force_full_rebuild=true
        required: false
        type: string
        default: ""

# Mapping:
#   main / tags v*   → production  → ECR techx-corp
#   techx-dev-corp   → development → ECR techx-dev-corp
#   workflow_dispatch → chosen environment
concurrency:
  # Environment-scoped so prod/dev publishes do not cancel each other.
  # yamllint disable-line rule:line-length
  group: build-push-${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || (startsWith(github.ref, 'refs/tags/v') && 'production' || (github.ref == 'refs/heads/main' && 'production' || 'development')) }}
  # Do not cancel a running publish: every selected digest must finish its security gates.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Reusable CI — lint + unit tests must pass before any AWS auth or push
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # 2. prepare — resolve env/tag/matrix; validate bake catalog; classify BUILD_SET
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      version: ${{ steps.resolve.outputs.version }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      services: ${{ steps.catalog.outputs.services }}
      service_count: ${{ steps.catalog.outputs.service_count }}
      mode: ${{ steps.classify.outputs.mode }}
      build_services: ${{ steps.classify.outputs.build_services }}
      build_count: ${{ steps.classify.outputs.build_count }}
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Need enough history for git diff against github.event.before on selective rebuilds.
          fetch-depth: 0

      - name: Resolve environment and image version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          DISPATCH_ENV: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(printf '%s' "${SHA}" | cut -c1-7)"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            TARGET_ENV="${DISPATCH_ENV}"
          elif [[ "${REF}" == refs/tags/v* ]]; then
            TARGET_ENV="production"
          elif [[ "${REF}" == "refs/heads/main" ]]; then
            TARGET_ENV="production"
          else
            TARGET_ENV="development"
          fi

          if [[ "${REF}" == refs/tags/v* ]]; then
            VERSION="${REF_NAME}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          {
            echo "target_environment=${TARGET_ENV}"
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
          } >> "${GITHUB_OUTPUT}"

          echo "target_environment=${TARGET_ENV}"
          echo "version=${VERSION}"
          echo "short_sha=${SHORT_SHA}"

      - name: Validate release catalog and bake definition
        id: catalog
        env:
          IMAGE_NAME: "validate.example/techx-corp"
          DEMO_VERSION: "catalog-check"
        run: |
          set -euo pipefail

          # Canonical release set (shared with PR CI / scripts/release_services.json).
          RELEASE_JSON="$(jq -c '.' scripts/release_services.json)"

          mapfile -t RELEASE < <(printf '%s' "${RELEASE_JSON}" | jq -r '.[]')

          # Compose build targets (requires committed .env for Dockerfile vars).
          # Preserve step env placeholders: `set -a; source .env` would otherwise
          # overwrite them with local defaults (e.g. DEMO_VERSION=latest).
          CI_IMAGE_NAME="${IMAGE_NAME}"
          CI_DEMO_VERSION="${DEMO_VERSION}"
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          export IMAGE_NAME="${CI_IMAGE_NAME}"
          export DEMO_VERSION="${CI_DEMO_VERSION}"

          mapfile -t COMPOSE_BUILDS < <(
            docker compose -f docker-compose.yml config --format json \
              | jq -r '.services | to_entries[] | select(.value.build != null) | .key' \
              | sort -u
          )

          # release must equal all compose build targets (no missing/extra services).
          declare -A SEEN=()
          for s in "${RELEASE[@]}"; do
            if [[ -n "${SEEN[$s]+x}" ]]; then
              echo "::error::Duplicate classification for service '${s}'"
              exit 1
            fi
            SEEN[$s]=1
          done

          mapfile -t RELEASE_SORTED < <(printf '%s\n' "${RELEASE[@]}" | sort -u)
          mapfile -t COMPOSE_SORTED < <(printf '%s\n' "${COMPOSE_BUILDS[@]}" | sort -u)

          if [[ "${#RELEASE_SORTED[@]}" -ne "${#COMPOSE_SORTED[@]}" ]]; then
            echo "::error::Catalog size mismatch: release=${#RELEASE_SORTED[@]} compose-builds=${#COMPOSE_SORTED[@]}"
            echo "release:        ${RELEASE_SORTED[*]}"
            echo "compose builds: ${COMPOSE_SORTED[*]}"
            exit 1
          fi

          for i in "${!RELEASE_SORTED[@]}"; do
            if [[ "${RELEASE_SORTED[$i]}" != "${COMPOSE_SORTED[$i]}" ]]; then
              echo "::error::Catalog mismatch at index ${i}: release='${RELEASE_SORTED[$i]}' compose='${COMPOSE_SORTED[$i]}'"
              echo "A newly added Compose build target must be listed in docker-bake.hcl group release."
              exit 1
            fi
          done

          if [[ "${#RELEASE[@]}" -ne 23 ]]; then
            echo "::error::Expected 23 release services, got ${#RELEASE[@]}"
            exit 1
          fi

          # Validate bake merge and print release definition.
          BAKE_RAW="$(docker buildx bake -f docker-compose.yml -f docker-bake.hcl release --print)"
          BAKE_JSON="${BAKE_RAW#"${BAKE_RAW%%\{*}"}"
          if [[ -z "${BAKE_JSON}" || "${BAKE_JSON:0:1}" != "{" ]]; then
            echo "::error::Failed to parse bake --print JSON"
            echo "${BAKE_RAW}"
            exit 1
          fi
          echo "${BAKE_JSON}" | jq -e '.group.release.targets | length == 23' >/dev/null

          mapfile -t BAKE_TARGETS < <(echo "${BAKE_JSON}" | jq -r '.group.release.targets[]' | sort -u)
          if [[ "${#BAKE_TARGETS[@]}" -ne 23 ]]; then
            echo "::error::Bake release group has ${#BAKE_TARGETS[@]} unique targets (want 23)"
            exit 1
          fi

          for svc in "${RELEASE[@]}"; do
            platforms="$(echo "${BAKE_JSON}" | jq -r --arg t "${svc}" '
              .target[$t].platforms // empty | if type == "array" then join(",") else . end
            ')"
            if [[ "${platforms}" != *"linux/amd64"* ]] || [[ "${platforms}" != *"linux/arm64"* ]]; then
              echo "::error::Target '${svc}' missing required platforms (got: ${platforms})"
              exit 1
            fi

            # BuildKit layer cache must be type=gha (not ECR :buildcache).
            # ECR image_tag_mutability=IMMUTABLE rejects overwriting movable cache tags.
            # bake --print may emit cache entries as CSV strings or as objects {type,scope,mode,...}.
            cache_from_ok="$(echo "${BAKE_JSON}" | jq -r --arg t "${svc}" '
              [.target[$t]["cache-from"] // empty | if type == "array" then .[] else . end]
              | map(if type == "object" then
                  ((.type // "") == "gha")
                  and ((.scope // "") == $t)
                else
                  (tostring | test("type=gha") and (contains("scope=" + $t) or contains("scope=\"" + $t)))
                end)
              | any(.)
            ')"
            cache_to_ok="$(echo "${BAKE_JSON}" | jq -r --arg t "${svc}" '
              [.target[$t]["cache-to"] // empty | if type == "array" then .[] else . end]
              | map(if type == "object" then
                  ((.type // "") == "gha")
                  and ((.scope // "") == $t)
                  and ((.mode // "") == "max" or (.mode // "") == "MAX")
                else
                  (tostring | test("type=gha") and contains("mode=max")
                    and (contains("scope=" + $t) or contains("scope=\"" + $t)))
                end)
              | any(.)
            ')"
            if [[ "${cache_from_ok}" != "true" ]]; then
              echo "::error::Target '${svc}' cache-from must be type=gha with scope=${svc}"
              echo "${BAKE_JSON}" | jq --arg t "${svc}" '.target[$t]["cache-from"]'
              exit 1
            fi
            if [[ "${cache_to_ok}" != "true" ]]; then
              echo "::error::Target '${svc}' cache-to must be type=gha,mode=max,scope=${svc}"
              echo "${BAKE_JSON}" | jq --arg t "${svc}" '.target[$t]["cache-to"]'
              exit 1
            fi
          done

          # Customized OpenSearch must be part of the release set (Helm pulls from ECR).
          if ! echo "${BAKE_JSON}" | jq -e '.group.release.targets | index("opensearch")' >/dev/null 2>&1; then
            echo "::error::opensearch must be in the release group"
            exit 1
          fi

          SERVICES_OUT="$(printf '%s' "${RELEASE_JSON}" | jq -c '.')"
          {
            echo "services=${SERVICES_OUT}"
            echo "service_count=${#RELEASE[@]}"
          } >> "${GITHUB_OUTPUT}"

          echo "Catalog OK: ${#RELEASE[@]} release = ${#COMPOSE_SORTED[@]} compose builds"
          echo "Release services: ${RELEASE[*]}"

      - name: Classify services into BUILD_SET
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          FORCE_FULL: ${{ inputs.force_full_rebuild }}
          FULL_REBUILD_REASON: ${{ inputs.full_rebuild_reason }}
          REQUESTED_SERVICES: ${{ inputs.requested_services }}
          REQUESTED_SERVICES_REASON: ${{ inputs.requested_services_reason }}
          SERVICES_JSON: ${{ steps.catalog.outputs.services }}
        run: |
          set -euo pipefail

          mapfile -t RELEASE < <(printf '%s' "${SERVICES_JSON}" | jq -r '.[]')
          declare -A IS_RELEASE=()
          for s in "${RELEASE[@]}"; do
            IS_RELEASE["${s}"]=1
          done

          MODE="none"
          REASON="no release service changes"
          declare -A BUILD_SET=()

          is_zero_sha() {
            local s="$1"
            [[ -z "${s}" || "${s}" =~ ^0+$ ]]
          }

          classify_from_diff() {
            # Sets MODE, REASON, BUILD_SET from git diff BASE_SHA..SHA.
            local base_sha="$1"
            local why_prefix="$2"
            if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              echo "::error::${why_prefix}: base SHA ${base_sha} not in fetch history"
              exit 1
            fi
            mapfile -t CHANGED < <(git diff --name-only "${base_sha}" "${SHA}" | sort -u)
            if [[ "${#CHANGED[@]}" -eq 0 ]]; then
              MODE="none"
              REASON="${why_prefix}: no file diff"
              return 0
            fi
            local FULL_TRIGGER=0
            for f in "${CHANGED[@]}"; do
              case "${f}" in
                # Shared contracts that can affect every image. Compose/bake catalog
                # edits alone do NOT force full bake: service source paths remain the
                # authoritative selective input.
                # Operators can still force_full_rebuild for platform/bake-wide changes.
                pb/*|buildkitd.toml|.env|.gitmodules)
                  FULL_TRIGGER=1
                  echo "Full rebuild trigger: ${f}"
                  ;;
                docker-compose.yml|docker-bake.hcl)
                  echo "Catalog/definition change (selective; not a full-bake trigger): ${f}"
                  ;;
                third-party/mem0|third-party/mem0/*)
                  BUILD_SET["mem0"]=1
                  echo "Service change: mem0 (${f})"
                  ;;
                src/*)
                  rest="${f#src/}"
                  svc="${rest%%/*}"
                  if [[ -n "${svc}" && -n "${IS_RELEASE[${svc}]+x}" ]]; then
                    BUILD_SET["${svc}"]=1
                    echo "Service change: ${svc} (${f})"
                  else
                    echo "Non-release src path (no bake forced): ${f}"
                  fi
                  ;;
                *)
                  echo "Non-image path (ignored for classification): ${f}"
                  ;;
              esac
            done
            if [[ "${FULL_TRIGGER}" -eq 1 ]]; then
              MODE="full"
              REASON="${why_prefix}: shared/global image path changed"
            elif [[ "${#BUILD_SET[@]}" -gt 0 ]]; then
              MODE="selective"
              REASON="${why_prefix}: path-based selective rebuild"
            else
              MODE="none"
              REASON="${why_prefix}: no release service changes"
            fi
          }

          # Tag releases always bake the full set (immutable release identity).
          if [[ "${REF}" == refs/tags/v* ]]; then
            MODE="full"
            REASON="git tag push"
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Full rebuild is exceptional and must leave an auditable justification.
            if [[ "${FORCE_FULL}" != "false" && "${FORCE_FULL}" != "False" && -z "${FULL_REBUILD_REASON//[[:space:]]/}" ]]; then
              echo "::error::full_rebuild_reason is required when force_full_rebuild=true"
              exit 1
            fi
            if [[ "${FORCE_FULL}" != "false" && "${FORCE_FULL}" != "False" && -n "${REQUESTED_SERVICES//[[:space:],]/}" ]]; then
              echo "::error::requested_services cannot be combined with force_full_rebuild=true"
              exit 1
            fi
            if [[ "${FORCE_FULL}" == "false" || "${FORCE_FULL}" == "False" ]]; then
              if [[ -n "${REQUESTED_SERVICES//[[:space:],]/}" ]]; then
                if [[ -z "${REQUESTED_SERVICES_REASON//[[:space:]]/}" ]]; then
                  echo "::error::requested_services_reason is required when requested_services is non-empty"
                  exit 1
                fi
                normalized="${REQUESTED_SERVICES//,/ }"
                read -r -a requested_list <<< "${normalized}"
                for requested in "${requested_list[@]}"; do
                  if [[ -z "${IS_RELEASE[${requested}]+x}" ]]; then
                    echo "::error::requested service '${requested}' is not in the release catalog"
                    exit 1
                  fi
                  BUILD_SET["${requested}"]=1
                  echo "Operator-requested service: ${requested}"
                done
                MODE="selective"
                REASON="workflow_dispatch requested_services: ${REQUESTED_SERVICES_REASON}"
              elif ! is_zero_sha "${BEFORE_SHA:-}" && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
                classify_from_diff "${BEFORE_SHA}" "workflow_dispatch"
              elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                classify_from_diff "$(git rev-parse HEAD^)" "workflow_dispatch"
              else
                echo "::error::workflow_dispatch selective mode requires a parent commit for classification"
                exit 1
              fi
            else
              MODE="full"
              REASON="workflow_dispatch force_full_rebuild: ${FULL_REBUILD_REASON}"
            fi
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if is_zero_sha "${BEFORE_SHA:-}"; then
              MODE="full"
              REASON="push with empty/zero before SHA (first commit or force)"
            else
              classify_from_diff "${BEFORE_SHA}" "push"
            fi
          else
            MODE="full"
            REASON="unsupported event ${EVENT_NAME}"
          fi

          BUILD_LIST=()
          if [[ "${MODE}" == "full" ]]; then
            BUILD_LIST=("${RELEASE[@]}")
          elif [[ "${MODE}" == "selective" ]]; then
            for s in "${RELEASE[@]}"; do
              if [[ -n "${BUILD_SET[${s}]+x}" ]]; then
                BUILD_LIST+=("${s}")
              fi
            done
          fi

          if [[ "${#BUILD_LIST[@]}" -eq 0 ]]; then
            BUILD_JSON='[]'
          else
            BUILD_JSON="$(printf '%s\n' "${BUILD_LIST[@]}" | jq -Rsc 'split("\n") | map(select(length>0))')"
          fi
          BUILD_COUNT="$(printf '%s' "${BUILD_JSON}" | jq 'length')"
          UNIQUE_COUNT="$(printf '%s' "${BUILD_JSON}" | jq 'unique | length')"
          if [[ "${UNIQUE_COUNT}" -ne "${BUILD_COUNT}" || "${BUILD_COUNT}" -gt "${#RELEASE[@]}" ]]; then
            echo "::error::BUILD_SET is invalid: count=${BUILD_COUNT} unique=${UNIQUE_COUNT} release=${#RELEASE[@]}"
            exit 1
          fi

          {
            echo "mode=${MODE}"
            echo "build_services=${BUILD_JSON}"
            echo "build_count=${BUILD_COUNT}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Image rebuild classification"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Mode | \`${MODE}\` |"
            echo "| Reason | ${REASON} |"
            echo "| NEW_TAG | (prepare version output) |"
            echo "| BUILD_SET count | ${BUILD_COUNT} |"
            echo ""
            echo "### BUILD_SET"
            echo ""
            if [[ "${BUILD_COUNT}" -eq 0 ]]; then
              echo "_none_"
            else
              printf '%s\n' "${BUILD_LIST[@]}" | sed 's/^/- /'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "mode=${MODE} reason=${REASON}"
          echo "build_count=${BUILD_COUNT}"
          echo "build_services=${BUILD_JSON}"

  # ---------------------------------------------------------------------------
  # 3. preflight — OIDC + ECR repository checks for BUILD_SET
  # ---------------------------------------------------------------------------
  preflight:
    name: AWS/ECR preflight
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      build_services: ${{ steps.selected.outputs.build_services }}
      build_count: ${{ steps.selected.outputs.build_count }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Validate environment configuration
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ROLE_ARN}" ]]; then
            echo "::error::GitHub Environment variable AWS_ROLE_ARN is not set on '${TARGET_ENV}'. See docs/CICD.md."
            exit 1
          fi
          if [[ -z "${IMAGE_NAME}" ]]; then
            echo "::error::GitHub Environment variable IMAGE_NAME is not set on '${TARGET_ENV}'. See docs/CICD.md."
            exit 1
          fi
          echo "IMAGE_NAME=${IMAGE_NAME}"
          echo "AWS_ROLE_ARN is configured for environment ${TARGET_ENV}"

      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECR repositories for BUILD_SET
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          SERVICES_JSON: ${{ needs.prepare.outputs.build_services }}
        run: |
          set -euo pipefail
          # IMAGE_NAME = REGISTRY/PROJECT (e.g. 123.dkr.ecr.region.amazonaws.com/techx-dev-corp)
          PROJECT="${IMAGE_NAME#*/}"
          if [[ -z "${PROJECT}" || "${PROJECT}" == "${IMAGE_NAME}" ]]; then
            echo "::error::IMAGE_NAME must be REGISTRY/PROJECT, got: ${IMAGE_NAME}"
            exit 1
          fi

          mapfile -t SERVICES < <(printf '%s' "${SERVICES_JSON}" | jq -r '.[]')
          MISSING=()
          for svc in "${SERVICES[@]}"; do
            REPO="${PROJECT}/${svc}"
            if ! aws ecr describe-repositories --repository-names "${REPO}" --region "${AWS_REGION}" >/dev/null 2>&1; then
              MISSING+=("${REPO}")
            else
              echo "OK repository ${REPO}"
            fi
          done

          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            echo "::error::Missing ECR repositories (${#MISSING[@]}):"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All ${#SERVICES[@]} BUILD_SET repositories exist under project ${PROJECT}"

      - name: Expose validated BUILD_SET
        id: selected
        env:
          BUILD_SERVICES: ${{ needs.prepare.outputs.build_services }}
          BUILD_COUNT: ${{ needs.prepare.outputs.build_count }}
        run: |
          set -euo pipefail
          echo "build_services=${BUILD_SERVICES}" >> "${GITHUB_OUTPUT}"
          echo "build_count=${BUILD_COUNT}" >> "${GITHUB_OUTPUT}"

  # ---------------------------------------------------------------------------
  # 4. build matrix — bake only services classified as changed (from source)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    needs: [prepare, preflight]
    if: needs.preflight.outputs.build_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
      # GHA BuildKit cache export (type=gha in docker-bake.hcl)
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 23
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.build_services) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h

      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        # aws-actions/amazon-ecr-login@v2.1.6
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64

      - name: Set up QEMU
        # docker/setup-qemu-action@v4.2.0
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4.2.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
          buildkitd-config: ./buildkitd.toml

      - name: Build and push service
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEMO_VERSION: ${{ needs.prepare.outputs.version }}
          IMAGE_VERSION: ${{ needs.prepare.outputs.version }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          # Load Dockerfile paths and build args from committed .env.
          # Do NOT source .env.override (may point at the test registry).
          #
          # Critical: .env sets DEMO_VERSION=latest and a default IMAGE_NAME for
          # local Compose. Those must NOT clobber the immutable release identity
          # resolved by prepare (sha-<7> / v*) or the environment's IMAGE_NAME.
          # Previously `set -a; source .env` overwrote both, so images landed in
          # ECR only as :latest while verify-ecr looked for :sha-XXXXXXX.
          CI_IMAGE_NAME="${IMAGE_NAME}"
          CI_DEMO_VERSION="${DEMO_VERSION}"
          CI_IMAGE_VERSION="${IMAGE_VERSION}"

          set -a
          # shellcheck disable=SC1091
          source .env
          set +a

          # Override local Compose defaults from .env with the CI release identity.
          export IMAGE_NAME="${CI_IMAGE_NAME}"
          export DEMO_VERSION="${CI_DEMO_VERSION}"
          export IMAGE_VERSION="${CI_IMAGE_VERSION}"

          echo "Baking service=${SERVICE}"
          echo "  IMAGE_NAME=${IMAGE_NAME}"
          echo "  DEMO_VERSION=${DEMO_VERSION}"
          echo "  platforms=linux/amd64,linux/arm64 (from docker-bake.hcl)"
          echo "  cache=type=gha,scope=${SERVICE}"
          echo "  runtime_tag=${IMAGE_NAME}/${SERVICE}:${DEMO_VERSION}"

          docker buildx bake -f docker-compose.yml -f docker-bake.hcl "${SERVICE}" --push

      - name: Job summary
        if: always()
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEMO_VERSION: ${{ needs.prepare.outputs.version }}
          SERVICE: ${{ matrix.service }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
        run: |
          {
            echo "## Build ${SERVICE}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Service | \`${SERVICE}\` |"
            echo "| Image | \`${IMAGE_NAME}/${SERVICE}:${DEMO_VERSION}\` |"
            echo "| Cache | \`type=gha,scope=${SERVICE}\` |"
            echo "| Mode | bake from source |"
            echo "| Commit | \`${SHORT_SHA}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # 5. verify ECR — only BUILD_SET tags under NEW_TAG
  # ---------------------------------------------------------------------------
  verify-ecr:
    name: Verify ECR tags
    needs: [prepare, preflight, build]
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.build_count != '0' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Describe every BUILD_SET tag
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEMO_VERSION: ${{ needs.prepare.outputs.version }}
          SERVICES_JSON: ${{ needs.preflight.outputs.build_services }}
        run: |
          set -euo pipefail
          PROJECT="${IMAGE_NAME#*/}"
          mapfile -t SERVICES < <(printf '%s' "${SERVICES_JSON}" | jq -r '.[]')

          MISSING=()
          FOUND=()
          {
            echo "## ECR verification for \`${DEMO_VERSION}\`"
            echo ""
            echo "| Service | Repository | Digest |"
            echo "|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"

          for svc in "${SERVICES[@]}"; do
            REPO="${PROJECT}/${svc}"
            if DESC="$(aws ecr describe-images \
              --repository-name "${REPO}" \
              --image-ids "imageTag=${DEMO_VERSION}" \
              --region "${AWS_REGION}" \
              --output json 2>/dev/null)"; then
              DIGEST="$(printf '%s' "${DESC}" | jq -r '.imageDetails[0].imageDigest // "unknown"')"
              FOUND+=("${svc}")
              echo "| \`${svc}\` | \`${REPO}\` | \`${DIGEST}\` |" >> "${GITHUB_STEP_SUMMARY}"
              echo "OK ${REPO}:${DEMO_VERSION} digest=${DIGEST}"
            else
              MISSING+=("${svc}")
              echo "| \`${svc}\` | \`${REPO}\` | **MISSING** |" >> "${GITHUB_STEP_SUMMARY}"
              echo "MISSING ${REPO}:${DEMO_VERSION}"
            fi
          done

          {
            echo ""
            echo "Found: ${#FOUND[@]} / ${#SERVICES[@]}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            echo "::error::Missing ECR images for tag ${DEMO_VERSION} (${#MISSING[@]}): ${MISSING[*]}"
            exit 1
          fi
          echo "All ${#SERVICES[@]} release images present for tag ${DEMO_VERSION}"

  # Security gates run after images exist in the private registry and before any
  # chart mutation. A failure here makes release-ready fail closed.
  resolve-image-digests:
    name: Resolve image digests
    needs: [prepare, preflight, verify-ecr]
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      digest_map: ${{ steps.resolve.outputs.digest_map }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Resolve catalog digests
        id: resolve
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SERVICES_JSON: ${{ needs.preflight.outputs.build_services }}
        run: |
          set -euo pipefail
          project="${IMAGE_NAME#*/}"
          digest_map='{}'
          while IFS= read -r service; do
            digest="$(aws ecr describe-images --repository-name "${project}/${service}" --image-ids "imageTag=${VERSION}" --query 'imageDetails[0].imageDigest' --output text)"
            [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::Invalid digest for ${service}: ${digest}"; exit 1; }
            digest_map="$(jq -c --arg service "${service}" --arg digest "${digest}" '. + {($service):$digest}' <<<"${digest_map}")"
          done < <(jq -r '.[]' <<<"${SERVICES_JSON}")
          echo "digest_map=${digest_map}" >> "${GITHUB_OUTPUT}"

  trivy-image-scan:
    name: Trivy image scan
    needs: [prepare, preflight, verify-ecr]
    # Scan exactly BUILD_SET; unchanged digests are not republished.
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      needs.preflight.result == 'success' &&
      needs.verify-ecr.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.build_services) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      IMAGE_REF: ${{ vars.IMAGE_NAME }}/${{ matrix.service }}:${{ needs.prepare.outputs.version }}
    steps:
      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        # aws-actions/amazon-ecr-login@v2.1.6
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64
      - name: Block HIGH and CRITICAL vulnerabilities
        # aquasecurity/trivy-action@v0.36.0
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          version: v0.69.3
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          # Fail only on findings with a published fix. Vendor images (Kafka/OpenSearch/etc.)
          # and will_not_fix OS packages otherwise block every release despite rebuilds.
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          # Temporary, service-scoped exception requested by the tech lead while
          # the AI team remediates shopping-copilot. Every baseline service remains
          # fail-closed. Remove this exception when that image is handed back.
          exit-code: ${{ matrix.service == 'shopping-copilot' && '0' || '1' }}

  trivy-iac-scan:
    name: Trivy IaC misconfiguration
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Block HIGH and CRITICAL IaC misconfigurations
        # aquasecurity/trivy-action@v0.36.0
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          version: v0.69.3
          scan-type: config
          scan-ref: .
          skip-dirs: node_modules
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  semgrep-sast:
    name: Semgrep SAST
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install pinned Semgrep
        run: python3 -m pip install --disable-pip-version-check 'semgrep==1.136.0'
      - name: Run blocking SAST rules
        env:
          BASELINE_COMMIT: ${{ github.event.before }}
        run: |
          set -euo pipefail
          args=(scan --error --metrics=off --config p/ci --config p/owasp-top-ten)
          if [[ -n "${BASELINE_COMMIT}" && ! "${BASELINE_COMMIT}" =~ ^0+$ ]] && git cat-file -e "${BASELINE_COMMIT}^{commit}"; then
            args+=(--baseline-commit "${BASELINE_COMMIT}")
          fi
          semgrep "${args[@]}" src

  trufflehog-secrets:
    name: TruffleHog secrets
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Install pinned TruffleHog with checksum verification
        env:
          TRUFFLEHOG_VERSION: 3.90.8
        run: |
          set -euo pipefail
          base="https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}"
          archive="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error -o "/tmp/${archive}" "${base}/${archive}"
          curl --fail --location --silent --show-error -o /tmp/trufflehog_checksums.txt "${base}/trufflehog_${TRUFFLEHOG_VERSION}_checksums.txt"
          grep " ${archive}$" /tmp/trufflehog_checksums.txt | sed 's#  #  /tmp/#' | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /tmp trufflehog
          sudo install -m 0755 /tmp/trufflehog /usr/local/bin/trufflehog
      - name: Scan repository history for verified secrets
        run: trufflehog git "file://${GITHUB_WORKSPACE}" --fail --only-verified --no-update

  sign-and-attest:
    name: Sign and attest ${{ matrix.service }}
    # Trivy image scan is embedded in build (before ECR push). verify-ecr only
    # succeeds after that gated push, so a clean verify implies a clean image scan.
    needs: [prepare, preflight, verify-ecr, trivy-iac-scan, semgrep-sast, trufflehog-secrets]
    # Sign exactly the digests built, Trivy-scanned, and pushed in this run.
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      needs.preflight.result == 'success' &&
      needs.verify-ecr.result == 'success' &&
      needs.trivy-iac-scan.result == 'success' &&
      needs.semgrep-sast.result == 'success' &&
      needs.trufflehog-secrets.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.build_services) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      COSIGN_KEY: ${{ vars.COSIGN_KMS_KEY || 'awskms:///alias/tf2-cosign-signing-key' }}
      # Application image tags stay immutable; Cosign's read-append-write metadata
      # is stored in a dedicated mutable repository so retries and multiple
      # attestations do not overwrite runtime image tags.
      COSIGN_REPOSITORY: ${{ vars.IMAGE_NAME }}/cosign-artifacts
      PROVENANCE_TYPE: https://techx-corp.dev/attestations/provenance/v1
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        # aws-actions/amazon-ecr-login@v2.1.6
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64
      - name: Install Cosign
        # sigstore/cosign-installer@v3.9.2
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Resolve immutable image reference
        id: image
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          project="${IMAGE_NAME#*/}"
          digest="$(aws ecr describe-images --repository-name "${project}/${SERVICE}" --image-ids "imageTag=${VERSION}" --query 'imageDetails[0].imageDigest' --output text)"
          [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::Invalid digest: ${digest}"; exit 1; }
          echo "ref=${IMAGE_NAME}/${SERVICE}@${digest}" >> "${GITHUB_OUTPUT}"
      - name: Resolve merged PR approver
        id: approval
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq 'map(select(.merged_at != null))[0].number // empty' || true)"
          approver=""
          if [[ -n "${pr_number}" ]]; then
            approver="$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json reviews --jq '[.reviews[] | select(.state == "APPROVED")][-1].author.login // empty' || true)"
          fi
          if [[ -n "${pr_number}" && -n "${approver}" ]]; then
            echo "Resolved PR #${pr_number} approved by ${approver}"
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            # Manual republish: Environment protection is the human gate.
            pr_number="0"
            approver="${ACTOR}"
            echo "::warning::No approved merged PR for ${GITHUB_SHA}; recording workflow_dispatch actor=${ACTOR}"
          elif [[ "${REF}" == refs/tags/v* ]]; then
            pr_number="0"
            approver="${ACTOR}"
            echo "::warning::No approved merged PR for tag ${REF}; recording tag pusher actor=${ACTOR}"
          else
            echo "::error::No merged PR with APPROVED review for ${GITHUB_SHA}. Use an approved PR merge, a v* tag, or workflow_dispatch."
            exit 1
          fi
          echo "pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          echo "approver=${approver}" >> "${GITHUB_OUTPUT}"
      - name: Sign image digest
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
        run: cosign sign --yes --key "${COSIGN_KEY}" "${IMAGE}"
      - name: Generate and attest CycloneDX SBOM
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
          SYFT_VERSION: 1.28.0
        run: |
          set -euo pipefail
          base="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"
          archive="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error -o "/tmp/${archive}" "${base}/${archive}"
          curl --fail --location --silent --show-error -o /tmp/syft_checksums.txt "${base}/syft_${SYFT_VERSION}_checksums.txt"
          grep " ${archive}$" /tmp/syft_checksums.txt | sed 's#  #  /tmp/#' | sha256sum --check --strict
          tar -xzf "/tmp/${archive}" -C /tmp syft
          /tmp/syft "${IMAGE}" -o cyclonedx-json=sbom.cdx.json
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx --key "${COSIGN_KEY}" "${IMAGE}"
      - name: Create metadata provenance and attest image
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
          PR_NUMBER: ${{ steps.approval.outputs.pr_number }}
          PR_APPROVER: ${{ steps.approval.outputs.approver }}
        run: |
          set -euo pipefail
          jq -n \
            --arg commit "${GITHUB_SHA}" \
            --argjson pr_number "${PR_NUMBER}" \
            --arg pr_approved_by "${PR_APPROVER}" \
            --arg signer "${COSIGN_KEY}" \
            --arg workflow_run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{schema_version:1,commit:$commit,pr_number:$pr_number,pr_approved_by:$pr_approved_by,signer:$signer,scans:{trivy_image:"pass",trivy_iac:"pass",semgrep:"pass",trufflehog:"pass"},sbom:{format:"cyclonedx",attested:true},workflow_run_url:$workflow_run_url}' \
            > predicate.json
          cosign attest --yes --predicate predicate.json --type "${PROVENANCE_TYPE}" --key "${COSIGN_KEY}" "${IMAGE}"

  # ---------------------------------------------------------------------------
  # 6. publish-mem0-fastembed-artifact — only when mem0 is in BUILD_SET.
  # ---------------------------------------------------------------------------
  publish-mem0-fastembed-artifact:
    name: Publish Mem0 FastEmbed artifact
    needs: [prepare, preflight]
    if: contains(needs.preflight.outputs.build_services, '"mem0"')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      MEM0_FASTEMBED_ARTIFACT_S3_URI: ${{ vars.MEM0_FASTEMBED_ARTIFACT_S3_URI }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
    steps:
      - name: Validate artifact destination
        id: dest
        run: |
          set -euo pipefail
          if [[ -z "${MEM0_FASTEMBED_ARTIFACT_S3_URI}" ]]; then
            # Do not block the whole image release when CloudOps has not wired the
            # model-cache bucket URI yet. The mem0 image publish still proceeds.
            echo "::warning::MEM0_FASTEMBED_ARTIFACT_S3_URI is not set on '${TARGET_ENV}'; skipping FastEmbed publish."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          case "${MEM0_FASTEMBED_ARTIFACT_S3_URI}" in
            s3://*) ;;
            *)
              echo "::error::MEM0_FASTEMBED_ARTIFACT_S3_URI must start with s3://"
              exit 1
              ;;
          esac
          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "base_uri=${MEM0_FASTEMBED_ARTIFACT_S3_URI%/}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.dest.outputs.skip != 'true'
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        if: steps.dest.outputs.skip != 'true'
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/mem0/requirements-production.txt

      - name: Install Mem0 artifact dependencies
        if: steps.dest.outputs.skip != 'true'
        run: python -m pip install -r src/mem0/requirements-production.txt

      - name: Build FastEmbed artifact
        if: steps.dest.outputs.skip != 'true'
        run: python src/mem0/scripts/build_embedding_model_artifact.py --output-dir "${RUNNER_TEMP}/mem0-fastembed"

      - name: Validate FastEmbed artifact offline
        if: steps.dest.outputs.skip != 'true'
        run: |
          set -euo pipefail
          ARCHIVE="$(find "${RUNNER_TEMP}/mem0-fastembed" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [[ -z "${ARCHIVE}" ]]; then
            echo "::error::FastEmbed archive was not created"
            exit 1
          fi
          python src/mem0/scripts/validate_embedding_model_artifact.py \
            --archive "${ARCHIVE}" \
            --checksum "${ARCHIVE}.sha256"

      - name: Configure AWS credentials (OIDC)
        if: steps.dest.outputs.skip != 'true'
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload rebuilt artifact to S3
        if: steps.dest.outputs.skip != 'true'
        env:
          BASE_URI: ${{ steps.dest.outputs.base_uri }}
        run: |
          set -euo pipefail
          DEST="${BASE_URI}/${VERSION}/"
          aws s3 cp "${RUNNER_TEMP}/mem0-fastembed/" "${DEST}" \
            --recursive \
            --exclude "*" \
            --include "*.tar.gz" \
            --include "*.sha256" \
            --include "manifest.json" \
            --region "${AWS_REGION}"

          ARCHIVE_NAME="$(basename "$(find "${RUNNER_TEMP}/mem0-fastembed" -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)")"
          for name in "${ARCHIVE_NAME}" "${ARCHIVE_NAME}.sha256" "manifest.json"; do
            aws s3 ls "${DEST}${name}" --region "${AWS_REGION}" >/dev/null
          done

          {
            echo "## Mem0 FastEmbed artifact (build)"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Mode | build from source |"
            echo "| Prefix | \`${DEST}\` |"
            echo "| Archive | \`${ARCHIVE_NAME}\` |"
            echo "| Commit | \`${SHORT_SHA}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Job summary (skipped)
        if: steps.dest.outputs.skip == 'true'
        run: |
          {
            echo "## Mem0 FastEmbed artifact"
            echo ""
            echo "Skipped: \`MEM0_FASTEMBED_ARTIFACT_S3_URI\` is not set on \`${TARGET_ENV}\`."
            echo "The mem0 image build is independent of this optional artifact destination."
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # 7. release-ready — sole gate for chart promotion (auto-dev or auto-prod PR)
  # ---------------------------------------------------------------------------
  release-ready:
    name: Release ready
    if: always()
    # build embeds local Trivy before ECR push; no separate trivy-image-scan job.
    needs: [ci, prepare, preflight, build, verify-ecr, trivy-iac-scan, semgrep-sast, trufflehog-secrets, sign-and-attest, publish-mem0-fastembed-artifact]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Evaluate release gate
        env:
          CI_RESULT: ${{ needs.ci.result }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          VERIFY_RESULT: ${{ needs.verify-ecr.result }}
          TRIVY_IAC_RESULT: ${{ needs.trivy-iac-scan.result }}
          SEMGREP_RESULT: ${{ needs.semgrep-sast.result }}
          TRUFFLEHOG_RESULT: ${{ needs.trufflehog-secrets.result }}
          SIGN_RESULT: ${{ needs.sign-and-attest.result }}
          MEM0_ARTIFACT_RESULT: ${{ needs.publish-mem0-fastembed-artifact.result }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
          SERVICE_COUNT: ${{ needs.prepare.outputs.service_count }}
          MODE: ${{ needs.prepare.outputs.mode }}
          BUILD_COUNT: ${{ needs.preflight.outputs.build_count }}
          BUILD_SERVICES_JSON: ${{ needs.preflight.outputs.build_services }}
        run: |
          set -euo pipefail
          {
            echo "## Release-ready gate"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| ci | \`${CI_RESULT}\` |"
            echo "| prepare | \`${PREPARE_RESULT}\` |"
            echo "| preflight | \`${PREFLIGHT_RESULT}\` |"
            echo "| build (local Trivy → ECR push) | \`${BUILD_RESULT}\` |"
            echo "| verify-ecr | \`${VERIFY_RESULT}\` |"
            echo "| trivy-iac-scan | \`${TRIVY_IAC_RESULT}\` |"
            echo "| semgrep-sast | \`${SEMGREP_RESULT}\` |"
            echo "| trufflehog-secrets | \`${TRUFFLEHOG_RESULT}\` |"
            echo "| sign-and-attest | \`${SIGN_RESULT}\` |"
            echo "| publish-mem0-fastembed-artifact | \`${MEM0_ARTIFACT_RESULT}\` |"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Tag | \`${VERSION}\` |"
            echo "| Commit | \`${SHORT_SHA}\` |"
            echo "| Services | \`${SERVICE_COUNT}\` |"
            echo "| Mode | \`${MODE}\` |"
            echo "| Build count | \`${BUILD_COUNT}\` |"
            echo ""
            if [[ "${TARGET_ENV}" == "development" ]]; then
              echo "On success, **update-chart-dev** will direct-push rebuilt service digests under \`service-digest/\` on the chart repo."
            else
              echo "On success, **create-chart-prod-pr** will open a chart PR for \`service-digest/\` overlays (merge still required)."
            fi
            echo "This workflow does **not** deploy Helm resources or merge production chart PRs."
          } >> "${GITHUB_STEP_SUMMARY}"

          FAILED=0
          for pair in "ci:${CI_RESULT}" "prepare:${PREPARE_RESULT}" "preflight:${PREFLIGHT_RESULT}" "trivy-iac-scan:${TRIVY_IAC_RESULT}" "semgrep-sast:${SEMGREP_RESULT}" "trufflehog-secrets:${TRUFFLEHOG_RESULT}"; do
            name="${pair%%:*}"
            result="${pair#*:}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::Release gate failed: job '${name}' result='${result}' (want success)"
              FAILED=1
            fi
          done

          if [[ "${BUILD_COUNT}" -eq 0 ]]; then
            for pair in "build:${BUILD_RESULT}" "verify-ecr:${VERIFY_RESULT}" "sign-and-attest:${SIGN_RESULT}" "publish-mem0-fastembed-artifact:${MEM0_ARTIFACT_RESULT}"; do
              name="${pair%%:*}"
              result="${pair#*:}"
              if [[ "${result}" != "skipped" ]]; then
                echo "::error::No-op gate failed: job '${name}' result='${result}' (want skipped)"
                FAILED=1
              fi
            done
          else
            for pair in "build:${BUILD_RESULT}" "verify-ecr:${VERIFY_RESULT}" "sign-and-attest:${SIGN_RESULT}"; do
              name="${pair%%:*}"
              result="${pair#*:}"
              if [[ "${result}" != "success" ]]; then
                echo "::error::Release gate failed: job '${name}' result='${result}' (want success)"
                FAILED=1
              fi
            done
            if printf '%s' "${BUILD_SERVICES_JSON}" | jq -e 'index("mem0") != null' >/dev/null; then
              if [[ "${MEM0_ARTIFACT_RESULT}" != "success" ]]; then
                echo "::error::Release gate failed: mem0 artifact result='${MEM0_ARTIFACT_RESULT}' (want success)"
                FAILED=1
              fi
            elif [[ "${MEM0_ARTIFACT_RESULT}" != "skipped" ]]; then
              echo "::error::Mem0 is not in BUILD_SET but artifact job result='${MEM0_ARTIFACT_RESULT}' (want skipped)"
              FAILED=1
            fi
          fi

          if [[ "${FAILED}" -ne 0 ]]; then
            echo "Release is NOT ready. Do not promote chart values."
            exit 1
          fi

          if [[ "${BUILD_COUNT}" -eq 0 ]]; then
            echo "No release services changed; no image was published or promoted."
          else
            echo "Release is ready (tag=${VERSION}, env=${TARGET_ENV}, mode=${MODE}, build_count=${BUILD_COUNT})."
          fi

  # ---------------------------------------------------------------------------
  # 9. update-chart-dev — direct-push rebuilt services' immutable digests
  #    Runs only after release-ready succeeds for the development environment.
  #    Requires repository secret CHART_REPO_TOKEN (contents:write on chart repo).
  # ---------------------------------------------------------------------------
  update-chart-dev:
    name: Update chart dev service digests
    needs: [prepare, preflight, resolve-image-digests, release-ready]
    # always(): evaluate the explicit release gate even when a no-op BUILD_SET skips jobs.
    if: >
      always() &&
      needs.release-ready.result == 'success' &&
      needs.resolve-image-digests.result == 'success' &&
      needs.prepare.outputs.target_environment == 'development' &&
      needs.preflight.outputs.build_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Override via repository variables if remotes/branch names differ.
      CHART_REPO: ${{ vars.CHART_REPO || 'tf2-team/tf2-corp-chart' }}
      CHART_BRANCH: ${{ vars.CHART_BRANCH || 'techx-dev-corp' }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      PLATFORM_SHA: ${{ github.sha }}
      PLATFORM_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      BUILD_SERVICES_JSON: ${{ needs.preflight.outputs.build_services }}
      DIGEST_MAP_JSON: ${{ needs.resolve-image-digests.outputs.digest_map }}
    steps:
      - name: Require CHART_REPO_TOKEN
        env:
          CHART_REPO_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CHART_REPO_TOKEN}" ]]; then
            echo "::error::Secret CHART_REPO_TOKEN is not set. Create a fine-grained PAT (or classic PAT) with contents:write on ${CHART_REPO}, add it as a repository secret, then re-run. See docs/CICD.md."
            exit 1
          fi

      - name: Checkout platform digest updater
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: platform

      - name: Checkout chart repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ env.CHART_REPO }}
          ref: ${{ env.CHART_BRANCH }}
          token: ${{ secrets.CHART_REPO_TOKEN }}
          path: chart
          # Fetch enough history for rebase retries against concurrent pushes.
          fetch-depth: 20

      - name: Update rebuilt service digests and push
        working-directory: chart
        run: |
          set -euo pipefail
          python3 ../platform/scripts/update_chart_service_digests.py \
            --directory . \
            --subdir service-digest \
            --services-json "${BUILD_SERVICES_JSON}" \
            --digests-json "${DIGEST_MAP_JSON}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- 'service-digest/values-*.yaml'
          if git diff --cached --quiet; then
            echo "No rebuilt-service digest changed; nothing to push."
            exit 0
          fi
          git commit -m "chore(dev): promote rebuilt service digests" \
            -m "Platform commit: ${PLATFORM_SHA}" \
            -m "Workflow: ${PLATFORM_RUN_URL}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${CHART_BRANCH}"; then
              echo "Selective service digests pushed to ${CHART_REPO}@${CHART_BRANCH} (service-digest/)"
              exit 0
            fi
            git fetch origin "${CHART_BRANCH}"
            git rebase "origin/${CHART_BRANCH}"
            python3 ../platform/scripts/update_chart_service_digests.py \
              --directory . --subdir service-digest \
              --services-json "${BUILD_SERVICES_JSON}" --digests-json "${DIGEST_MAP_JSON}"
            git add -- 'service-digest/values-*.yaml'
            git commit --amend --no-edit
          done
          echo "::error::Failed to push selective digest update after 5 attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # 10. create-chart-prod-pr — open PR for rebuilt services' immutable digests
  #    Runs only after release-ready succeeds for the production environment.
  #    Does not merge; human review remains the production deploy gate.
  #    Requires repository secret CHART_REPO_TOKEN (Contents + Pull requests write).
  # ---------------------------------------------------------------------------
  create-chart-prod-pr:
    name: Create chart production digest PR
    needs: [prepare, preflight, resolve-image-digests, release-ready]
    # always(): evaluate the explicit release gate even when a no-op BUILD_SET skips jobs.
    if: >
      always() &&
      needs.release-ready.result == 'success' &&
      needs.resolve-image-digests.result == 'success' &&
      needs.prepare.outputs.target_environment == 'production' &&
      needs.preflight.outputs.build_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Override via repository variables if remotes/branch names differ.
      CHART_REPO: ${{ vars.CHART_REPO || 'tf2-team/tf2-corp-chart' }}
      CHART_PROD_BRANCH: ${{ vars.CHART_PROD_BRANCH || 'main' }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      PLATFORM_SHA: ${{ github.sha }}
      PLATFORM_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PLATFORM_REPO: ${{ github.repository }}
      BUILD_SERVICES_JSON: ${{ needs.preflight.outputs.build_services }}
      DIGEST_MAP_JSON: ${{ needs.resolve-image-digests.outputs.digest_map }}
    steps:
      - name: Require CHART_REPO_TOKEN
        env:
          CHART_REPO_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CHART_REPO_TOKEN}" ]]; then
            echo "::error::Secret CHART_REPO_TOKEN is not set. Create a fine-grained PAT with Contents: Read and write and Pull requests: Read and write on ${CHART_REPO}, add it as a repository secret, then re-run. See docs/CICD.md."
            exit 1
          fi

      - name: Checkout platform digest updater
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: platform

      - name: Checkout chart repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ env.CHART_REPO }}
          ref: ${{ env.CHART_PROD_BRANCH }}
          token: ${{ secrets.CHART_REPO_TOKEN }}
          path: chart
          fetch-depth: 20

      - name: Update rebuilt service digests and open production PR
        working-directory: chart
        env:
          GH_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
        run: |
          set -euo pipefail
          python3 ../platform/scripts/update_chart_service_digests.py \
            --directory . \
            --subdir service-digest \
            --services-json "${BUILD_SERVICES_JSON}" \
            --digests-json "${DIGEST_MAP_JSON}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          safe_version="$(printf '%s' "${VERSION}" | tr -c 'A-Za-z0-9._-' '-')"
          promote_branch="promote/prod-digests-${safe_version}"
          git checkout -B "${promote_branch}"
          git add -- 'service-digest/values-*.yaml'
          if git diff --cached --quiet; then
            echo "No rebuilt-service digest changed; no production PR required."
            exit 0
          fi
          git commit -m "chore(prod): promote rebuilt service digests" \
            -m "Platform commit: ${PLATFORM_SHA}" \
            -m "Workflow: ${PLATFORM_RUN_URL}"
          git push --force origin "HEAD:${promote_branch}"
          body="Promote only rebuilt service digests under service-digest/ after security scans and attestations. Platform run: ${PLATFORM_RUN_URL}"
          existing="$(gh pr list --repo "${CHART_REPO}" --head "${promote_branch}" --base "${CHART_PROD_BRANCH}" --state open --json url --jq '.[0].url // empty')"
          if [[ -n "${existing}" ]]; then
            gh pr edit "${existing}" --repo "${CHART_REPO}" --title "chore(prod): promote rebuilt service digests (${VERSION})" --body "${body}"
          else
            gh pr create --repo "${CHART_REPO}" --base "${CHART_PROD_BRANCH}" --head "${promote_branch}" --title "chore(prod): promote rebuilt service digests (${VERSION})" --body "${body}"
          fi

