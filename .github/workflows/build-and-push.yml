name: Build and push images

# Job graph: CI → prepare → AWS/ECR preflight (refine build/retag lists)
#            → build matrix (changed services from source) || retag (unchanged from PREV_TAG)
#            → verify ECR (all 21 under NEW_TAG) → release-ready
#            → update-chart-dev (development) | create-chart-prod-pr (production)
#
# Global Helm tag contract: every release service must exist under the same NEW_TAG.
# Unchanged services are retagged from PREV_TAG (not skipped); changed services bake from source.
# Dev: after release-ready, direct-push default.image.tag to chart repo values-dev.yaml
#      on branch techx-dev-corp (requires secret CHART_REPO_TOKEN).
# Prod: after release-ready, open a PR on the chart repo updating values-prod.yaml
#       (requires secret CHART_REPO_TOKEN with Contents + Pull requests write).

on:
  push:
    branches: [main, techx-dev-corp]
    # Branch pushes: only when image-affecting paths change.
    # Selective bake+retag still produces the full 21-image set under one global tag.
    # Tag pushes (v*) and workflow_dispatch always run (no path filter on those entry points).
    paths:
      - "src/**"
      - "pb/**"
      - "docker-compose.yml"
      - "docker-bake.hcl"
      - "buildkitd.toml"
      - ".env"
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target GitHub Environment (maps to ECR via environment variables)
        required: true
        type: choice
        options:
          - development
          - production
      force_full_rebuild:
        description: Bake all 21 services from source (ignore path-based selective rebuild)
        required: false
        type: boolean
        default: true
      previous_tag:
        description: >
          When force_full_rebuild is false, runtime tag to retag unchanged services from
          (e.g. sha-a1b2c3d or v1.2.3). Leave empty to derive sha-<before> from git history.
        required: false
        type: string
        default: ""

# Mapping:
#   main / tags v*   → production  → ECR techx-corp
#   techx-dev-corp   → development → ECR techx-dev-corp
#   workflow_dispatch → chosen environment
concurrency:
  # Environment-scoped so prod/dev publishes do not cancel each other.
  # yamllint disable-line rule:line-length
  group: build-push-${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || (startsWith(github.ref, 'refs/tags/v') && 'production' || (github.ref == 'refs/heads/main' && 'production' || 'development')) }}
  # Do not cancel a running publish: a partial global tag set is unsafe for Helm promotion.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Reusable CI — lint + unit tests must pass before any AWS auth or push
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # 2. prepare — resolve env/tag/matrix; validate bake catalog; classify build/retag
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      version: ${{ steps.resolve.outputs.version }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      services: ${{ steps.catalog.outputs.services }}
      service_count: ${{ steps.catalog.outputs.service_count }}
      prev_tag: ${{ steps.classify.outputs.prev_tag }}
      mode: ${{ steps.classify.outputs.mode }}
      build_services: ${{ steps.classify.outputs.build_services }}
      retag_services: ${{ steps.classify.outputs.retag_services }}
      build_count: ${{ steps.classify.outputs.build_count }}
      retag_count: ${{ steps.classify.outputs.retag_count }}
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Need enough history for git diff against github.event.before on selective rebuilds.
          fetch-depth: 0

      - name: Resolve environment and image version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          DISPATCH_ENV: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(printf '%s' "${SHA}" | cut -c1-7)"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            TARGET_ENV="${DISPATCH_ENV}"
          elif [[ "${REF}" == refs/tags/v* ]]; then
            TARGET_ENV="production"
          elif [[ "${REF}" == "refs/heads/main" ]]; then
            TARGET_ENV="production"
          else
            TARGET_ENV="development"
          fi

          if [[ "${REF}" == refs/tags/v* ]]; then
            VERSION="${REF_NAME}"
          else
            VERSION="sha-${SHORT_SHA}"
          fi

          {
            echo "target_environment=${TARGET_ENV}"
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
          } >> "${GITHUB_OUTPUT}"

          echo "target_environment=${TARGET_ENV}"
          echo "version=${VERSION}"
          echo "short_sha=${SHORT_SHA}"

      - name: Validate release catalog and bake definition
        id: catalog
        env:
          IMAGE_NAME: "validate.example/techx-corp"
          DEMO_VERSION: "catalog-check"
        run: |
          set -euo pipefail

          # Canonical release set (must match docker-bake.hcl group "release").
          RELEASE_JSON='["accounting","ad","cart","checkout","currency","email","flagd-ui","fraud-detection","frontend","frontend-proxy","image-provider","kafka","llm","load-generator","opensearch","payment","product-catalog","product-reviews","quote","recommendation","shipping"]'

          mapfile -t RELEASE < <(printf '%s' "${RELEASE_JSON}" | jq -r '.[]')

          # Compose build targets (requires committed .env for Dockerfile vars).
          # Preserve step env placeholders: `set -a; source .env` would otherwise
          # overwrite them with local defaults (e.g. DEMO_VERSION=latest).
          CI_IMAGE_NAME="${IMAGE_NAME}"
          CI_DEMO_VERSION="${DEMO_VERSION}"
          set -a
          # shellcheck disable=SC1091
          source .env
          set +a
          export IMAGE_NAME="${CI_IMAGE_NAME}"
          export DEMO_VERSION="${CI_DEMO_VERSION}"

          mapfile -t COMPOSE_BUILDS < <(
            docker compose -f docker-compose.yml config --format json \
              | jq -r '.services | to_entries[] | select(.value.build != null) | .key' \
              | sort -u
          )

          # release must equal all compose build targets (no missing/extra services).
          declare -A SEEN=()
          for s in "${RELEASE[@]}"; do
            if [[ -n "${SEEN[$s]+x}" ]]; then
              echo "::error::Duplicate classification for service '${s}'"
              exit 1
            fi
            SEEN[$s]=1
          done

          mapfile -t RELEASE_SORTED < <(printf '%s\n' "${RELEASE[@]}" | sort -u)
          mapfile -t COMPOSE_SORTED < <(printf '%s\n' "${COMPOSE_BUILDS[@]}" | sort -u)

          if [[ "${#RELEASE_SORTED[@]}" -ne "${#COMPOSE_SORTED[@]}" ]]; then
            echo "::error::Catalog size mismatch: release=${#RELEASE_SORTED[@]} compose-builds=${#COMPOSE_SORTED[@]}"
            echo "release:        ${RELEASE_SORTED[*]}"
            echo "compose builds: ${COMPOSE_SORTED[*]}"
            exit 1
          fi

          for i in "${!RELEASE_SORTED[@]}"; do
            if [[ "${RELEASE_SORTED[$i]}" != "${COMPOSE_SORTED[$i]}" ]]; then
              echo "::error::Catalog mismatch at index ${i}: release='${RELEASE_SORTED[$i]}' compose='${COMPOSE_SORTED[$i]}'"
              echo "A newly added Compose build target must be listed in docker-bake.hcl group release."
              exit 1
            fi
          done

          if [[ "${#RELEASE[@]}" -ne 21 ]]; then
            echo "::error::Expected 21 release services, got ${#RELEASE[@]}"
            exit 1
          fi

          # Validate bake merge and print release definition.
          BAKE_RAW="$(docker buildx bake -f docker-compose.yml -f docker-bake.hcl release --print)"
          BAKE_JSON="${BAKE_RAW#"${BAKE_RAW%%\{*}"}"
          if [[ -z "${BAKE_JSON}" || "${BAKE_JSON:0:1}" != "{" ]]; then
            echo "::error::Failed to parse bake --print JSON"
            echo "${BAKE_RAW}"
            exit 1
          fi
          echo "${BAKE_JSON}" | jq -e '.group.release.targets | length == 21' >/dev/null

          mapfile -t BAKE_TARGETS < <(echo "${BAKE_JSON}" | jq -r '.group.release.targets[]' | sort -u)
          if [[ "${#BAKE_TARGETS[@]}" -ne 21 ]]; then
            echo "::error::Bake release group has ${#BAKE_TARGETS[@]} unique targets (want 21)"
            exit 1
          fi

          for svc in "${RELEASE[@]}"; do
            platforms="$(echo "${BAKE_JSON}" | jq -r --arg t "${svc}" '
              .target[$t].platforms // empty | if type == "array" then join(",") else . end
            ')"
            if [[ "${platforms}" != *"linux/amd64"* ]] || [[ "${platforms}" != *"linux/arm64"* ]]; then
              echo "::error::Target '${svc}' missing required platforms (got: ${platforms})"
              exit 1
            fi

            expected_ref="${IMAGE_NAME}/${svc}:buildcache"
            # bake --print may emit cache entries as CSV strings or as objects {type,ref,...}.
            cache_from_ok="$(echo "${BAKE_JSON}" | jq -r --arg t "${svc}" --arg ref "${expected_ref}" '
              [.target[$t]["cache-from"] // empty | if type == "array" then .[] else . end]
              | map(if type == "object" then .ref // empty else tostring end)
              | any(. == $ref or contains($ref))
            ')"
            cache_to_ok="$(echo "${BAKE_JSON}" | jq -r --arg t "${svc}" --arg ref "${expected_ref}" '
              [.target[$t]["cache-to"] // empty | if type == "array" then .[] else . end]
              | map(if type == "object" then
                  ((.ref // "") == $ref or ((.ref // "") | tostring | contains($ref)))
                  and ((.mode // "") == "max" or (.mode // "") == "MAX")
                else
                  (tostring | contains($ref) and contains("mode=max"))
                end)
              | any(.)
            ')"
            if [[ "${cache_from_ok}" != "true" ]]; then
              echo "::error::Target '${svc}' cache-from missing ${expected_ref}"
              echo "${BAKE_JSON}" | jq --arg t "${svc}" '.target[$t]["cache-from"]'
              exit 1
            fi
            if [[ "${cache_to_ok}" != "true" ]]; then
              echo "::error::Target '${svc}' cache-to missing ${expected_ref} with mode=max"
              echo "${BAKE_JSON}" | jq --arg t "${svc}" '.target[$t]["cache-to"]'
              exit 1
            fi
          done

          # Customized OpenSearch must be part of the release set (Helm pulls from ECR).
          if ! echo "${BAKE_JSON}" | jq -e '.group.release.targets | index("opensearch")' >/dev/null 2>&1; then
            echo "::error::opensearch must be in the release group"
            exit 1
          fi

          SERVICES_OUT="$(printf '%s' "${RELEASE_JSON}" | jq -c '.')"
          {
            echo "services=${SERVICES_OUT}"
            echo "service_count=${#RELEASE[@]}"
          } >> "${GITHUB_OUTPUT}"

          echo "Catalog OK: ${#RELEASE[@]} release = ${#COMPOSE_SORTED[@]} compose builds"
          echo "Release services: ${RELEASE[*]}"

      - name: Classify build vs retag services
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          FORCE_FULL: ${{ inputs.force_full_rebuild }}
          PREVIOUS_TAG_INPUT: ${{ inputs.previous_tag }}
          SERVICES_JSON: ${{ steps.catalog.outputs.services }}
        run: |
          set -euo pipefail

          mapfile -t RELEASE < <(printf '%s' "${SERVICES_JSON}" | jq -r '.[]')
          declare -A IS_RELEASE=()
          for s in "${RELEASE[@]}"; do
            IS_RELEASE["${s}"]=1
          done

          MODE="full"
          PREV_TAG=""
          REASON="default full rebuild"
          declare -A BUILD_SET=()

          is_zero_sha() {
            local s="$1"
            [[ -z "${s}" || "${s}" =~ ^0+$ ]]
          }

          classify_from_diff() {
            # Sets MODE, REASON, BUILD_SET from git diff BASE_SHA..SHA.
            # Caller must set PREV_TAG before or after; this function does not clear it.
            local base_sha="$1"
            local why_prefix="$2"
            if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              MODE="full"
              REASON="${why_prefix}: base SHA ${base_sha} not in fetch history"
              return 0
            fi
            mapfile -t CHANGED < <(git diff --name-only "${base_sha}" "${SHA}" | sort -u)
            if [[ "${#CHANGED[@]}" -eq 0 ]]; then
              MODE="selective"
              REASON="${why_prefix}: no file diff (retag all from PREV_TAG)"
              return 0
            fi
            local FULL_TRIGGER=0
            for f in "${CHANGED[@]}"; do
              case "${f}" in
                pb/*|docker-compose.yml|docker-bake.hcl|buildkitd.toml|.env)
                  FULL_TRIGGER=1
                  echo "Full rebuild trigger: ${f}"
                  ;;
                src/*)
                  rest="${f#src/}"
                  svc="${rest%%/*}"
                  if [[ -n "${svc}" && -n "${IS_RELEASE[${svc}]+x}" ]]; then
                    BUILD_SET["${svc}"]=1
                    echo "Service change: ${svc} (${f})"
                  else
                    echo "Non-release src path (no bake forced): ${f}"
                  fi
                  ;;
                *)
                  echo "Non-image path (ignored for classification): ${f}"
                  ;;
              esac
            done
            if [[ "${FULL_TRIGGER}" -eq 1 ]]; then
              MODE="full"
              REASON="${why_prefix}: shared/global image path changed"
            else
              MODE="selective"
              REASON="${why_prefix}: path-based selective rebuild"
            fi
          }

          # Tag releases always bake the full set (immutable release identity).
          if [[ "${REF}" == refs/tags/v* ]]; then
            MODE="full"
            REASON="git tag push"
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            # workflow_dispatch: force_full_rebuild defaults true; boolean may be string.
            if [[ "${FORCE_FULL}" == "false" || "${FORCE_FULL}" == "False" ]]; then
              if [[ -n "${PREVIOUS_TAG_INPUT}" ]]; then
                PREV_TAG="${PREVIOUS_TAG_INPUT}"
              elif ! is_zero_sha "${BEFORE_SHA:-}"; then
                PREV_TAG="sha-$(printf '%s' "${BEFORE_SHA}" | cut -c1-7)"
              elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                PREV_TAG="sha-$(git rev-parse --short=7 HEAD^)"
              else
                PREV_TAG=""
              fi

              if [[ -z "${PREV_TAG}" ]]; then
                MODE="full"
                REASON="workflow_dispatch selective requested but no previous_tag / parent commit"
              else
                # Prefer path classification vs parent commit when available.
                if ! is_zero_sha "${BEFORE_SHA:-}" && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
                  classify_from_diff "${BEFORE_SHA}" "workflow_dispatch"
                elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                  classify_from_diff "$(git rev-parse HEAD^)" "workflow_dispatch"
                else
                  # No diff base: retag all from PREV_TAG (no source rebuild).
                  MODE="selective"
                  REASON="workflow_dispatch selective retag-all (no diff base)"
                fi
              fi
            else
              MODE="full"
              REASON="workflow_dispatch force_full_rebuild"
            fi
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if is_zero_sha "${BEFORE_SHA:-}"; then
              MODE="full"
              REASON="push with empty/zero before SHA (first commit or force)"
            else
              PREV_TAG="sha-$(printf '%s' "${BEFORE_SHA}" | cut -c1-7)"
              classify_from_diff "${BEFORE_SHA}" "push"
            fi
          else
            MODE="full"
            REASON="unsupported event ${EVENT_NAME}"
          fi

          BUILD_LIST=()
          RETAG_LIST=()

          if [[ "${MODE}" == "full" ]]; then
            BUILD_LIST=("${RELEASE[@]}")
            RETAG_LIST=()
            # Full bake does not retag; drop PREV_TAG so preflight skips retag existence checks.
            PREV_TAG=""
          else
            # selective: BUILD_SET may be empty → retag all (e.g. only non-release src/* changed)
            for s in "${RELEASE[@]}"; do
              if [[ -n "${BUILD_SET[${s}]+x}" ]]; then
                BUILD_LIST+=("${s}")
              else
                RETAG_LIST+=("${s}")
              fi
            done
            if [[ -z "${PREV_TAG}" ]]; then
              echo "::error::Selective mode requires PREV_TAG"
              exit 1
            fi
          fi

          if [[ "${#BUILD_LIST[@]}" -eq 0 ]]; then
            BUILD_JSON='[]'
          else
            BUILD_JSON="$(printf '%s\n' "${BUILD_LIST[@]}" | jq -Rsc 'split("\n") | map(select(length>0))')"
          fi
          if [[ "${#RETAG_LIST[@]}" -eq 0 ]]; then
            RETAG_JSON='[]'
          else
            RETAG_JSON="$(printf '%s\n' "${RETAG_LIST[@]}" | jq -Rsc 'split("\n") | map(select(length>0))')"
          fi
          BUILD_COUNT="$(printf '%s' "${BUILD_JSON}" | jq 'length')"
          RETAG_COUNT="$(printf '%s' "${RETAG_JSON}" | jq 'length')"

          # Invariants: disjoint union of release set.
          UNION_COUNT="$(jq -n --argjson b "${BUILD_JSON}" --argjson r "${RETAG_JSON}" '($b + $r) | unique | length')"
          OVERLAP="$(jq -n --argjson b "${BUILD_JSON}" --argjson r "${RETAG_JSON}" '($b - ($b - $r)) | length')"
          if [[ "${UNION_COUNT}" -ne "${#RELEASE[@]}" || "${OVERLAP}" -ne 0 ]]; then
            echo "::error::build/retag classification invalid: union=${UNION_COUNT} overlap=${OVERLAP} release=${#RELEASE[@]}"
            echo "build=${BUILD_JSON}"
            echo "retag=${RETAG_JSON}"
            exit 1
          fi
          if [[ $((BUILD_COUNT + RETAG_COUNT)) -ne "${#RELEASE[@]}" ]]; then
            echo "::error::build_count+retag_count != release count"
            exit 1
          fi

          {
            echo "mode=${MODE}"
            echo "prev_tag=${PREV_TAG}"
            echo "build_services=${BUILD_JSON}"
            echo "retag_services=${RETAG_JSON}"
            echo "build_count=${BUILD_COUNT}"
            echo "retag_count=${RETAG_COUNT}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Image rebuild classification"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Mode | \`${MODE}\` |"
            echo "| Reason | ${REASON} |"
            echo "| NEW_TAG | (prepare version output) |"
            echo "| PREV_TAG | \`${PREV_TAG:-none}\` |"
            echo "| Build from source | ${BUILD_COUNT} |"
            echo "| Retag from PREV_TAG | ${RETAG_COUNT} |"
            echo ""
            echo "### Build list"
            echo ""
            if [[ "${BUILD_COUNT}" -eq 0 ]]; then
              echo "_none_"
            else
              printf '%s\n' "${BUILD_LIST[@]}" | sed 's/^/- /'
            fi
            echo ""
            echo "### Retag list"
            echo ""
            if [[ "${RETAG_COUNT}" -eq 0 ]]; then
              echo "_none_"
            else
              printf '%s\n' "${RETAG_LIST[@]}" | sed 's/^/- /'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "mode=${MODE} reason=${REASON}"
          echo "prev_tag=${PREV_TAG:-none}"
          echo "build_count=${BUILD_COUNT} retag_count=${RETAG_COUNT}"
          echo "build_services=${BUILD_JSON}"
          echo "retag_services=${RETAG_JSON}"

  # ---------------------------------------------------------------------------
  # 3. preflight — OIDC + ECR repository checks; refine retag list if PREV_TAG missing
  # ---------------------------------------------------------------------------
  preflight:
    name: AWS/ECR preflight
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      build_services: ${{ steps.refine.outputs.build_services }}
      retag_services: ${{ steps.refine.outputs.retag_services }}
      build_count: ${{ steps.refine.outputs.build_count }}
      retag_count: ${{ steps.refine.outputs.retag_count }}
      prev_tag: ${{ steps.refine.outputs.prev_tag }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Validate environment configuration
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ROLE_ARN}" ]]; then
            echo "::error::GitHub Environment variable AWS_ROLE_ARN is not set on '${TARGET_ENV}'. See docs/CICD.md."
            exit 1
          fi
          if [[ -z "${IMAGE_NAME}" ]]; then
            echo "::error::GitHub Environment variable IMAGE_NAME is not set on '${TARGET_ENV}'. See docs/CICD.md."
            exit 1
          fi
          echo "IMAGE_NAME=${IMAGE_NAME}"
          echo "AWS_ROLE_ARN is configured for environment ${TARGET_ENV}"

      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECR repositories for release catalog
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          SERVICES_JSON: ${{ needs.prepare.outputs.services }}
        run: |
          set -euo pipefail
          # IMAGE_NAME = REGISTRY/PROJECT (e.g. 123.dkr.ecr.region.amazonaws.com/techx-dev-corp)
          PROJECT="${IMAGE_NAME#*/}"
          if [[ -z "${PROJECT}" || "${PROJECT}" == "${IMAGE_NAME}" ]]; then
            echo "::error::IMAGE_NAME must be REGISTRY/PROJECT, got: ${IMAGE_NAME}"
            exit 1
          fi

          mapfile -t SERVICES < <(printf '%s' "${SERVICES_JSON}" | jq -r '.[]')
          MISSING=()
          for svc in "${SERVICES[@]}"; do
            REPO="${PROJECT}/${svc}"
            if ! aws ecr describe-repositories --repository-names "${REPO}" --region "${AWS_REGION}" >/dev/null 2>&1; then
              MISSING+=("${REPO}")
            else
              echo "OK repository ${REPO}"
            fi
          done

          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            echo "::error::Missing ECR repositories (${#MISSING[@]}):"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "All ${#SERVICES[@]} ECR repositories exist under project ${PROJECT}"

      - name: Refine build/retag lists against PREV_TAG in ECR
        id: refine
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          PREV_TAG: ${{ needs.prepare.outputs.prev_tag }}
          MODE: ${{ needs.prepare.outputs.mode }}
          BUILD_JSON: ${{ needs.prepare.outputs.build_services }}
          RETAG_JSON: ${{ needs.prepare.outputs.retag_services }}
          SERVICES_JSON: ${{ needs.prepare.outputs.services }}
        run: |
          set -euo pipefail
          PROJECT="${IMAGE_NAME#*/}"

          mapfile -t BUILD_LIST < <(printf '%s' "${BUILD_JSON}" | jq -r '.[]?')
          mapfile -t RETAG_LIST < <(printf '%s' "${RETAG_JSON}" | jq -r '.[]?')
          # jq -r on empty array yields no lines; mapfile may leave empty array.

          MOVED=()
          KEPT_RETAG=()

          if [[ "${MODE}" == "selective" && -n "${PREV_TAG}" && "${#RETAG_LIST[@]}" -gt 0 ]]; then
            for svc in "${RETAG_LIST[@]}"; do
              REPO="${PROJECT}/${svc}"
              if aws ecr describe-images \
                --repository-name "${REPO}" \
                --image-ids "imageTag=${PREV_TAG}" \
                --region "${AWS_REGION}" \
                --output json >/dev/null 2>&1; then
                KEPT_RETAG+=("${svc}")
                echo "OK retag source ${REPO}:${PREV_TAG}"
              else
                BUILD_LIST+=("${svc}")
                MOVED+=("${svc}")
                echo "Missing ${REPO}:${PREV_TAG} → move to build-from-source"
              fi
            done
            if [[ "${#KEPT_RETAG[@]}" -eq 0 ]]; then
              RETAG_LIST=()
            else
              RETAG_LIST=("${KEPT_RETAG[@]}")
            fi
          fi

          # De-dupe lists while preserving order
          if [[ "${#BUILD_LIST[@]}" -eq 0 ]]; then
            BUILD_JSON_OUT='[]'
          else
            BUILD_JSON_OUT="$(printf '%s\n' "${BUILD_LIST[@]}" | awk 'NF && !seen[$0]++' | jq -Rsc 'split("\n") | map(select(length>0))')"
          fi
          if [[ "${#RETAG_LIST[@]}" -eq 0 ]]; then
            RETAG_JSON_OUT='[]'
          else
            RETAG_JSON_OUT="$(printf '%s\n' "${RETAG_LIST[@]}" | awk 'NF && !seen[$0]++' | jq -Rsc 'split("\n") | map(select(length>0))')"
          fi
          BUILD_COUNT="$(printf '%s' "${BUILD_JSON_OUT}" | jq 'length')"
          RETAG_COUNT="$(printf '%s' "${RETAG_JSON_OUT}" | jq 'length')"
          SERVICE_COUNT="$(printf '%s' "${SERVICES_JSON}" | jq 'length')"

          if [[ $((BUILD_COUNT + RETAG_COUNT)) -ne "${SERVICE_COUNT}" ]]; then
            echo "::error::Refined build+retag (${BUILD_COUNT}+${RETAG_COUNT}) != service_count ${SERVICE_COUNT}"
            exit 1
          fi

          {
            echo "build_services=${BUILD_JSON_OUT}"
            echo "retag_services=${RETAG_JSON_OUT}"
            echo "build_count=${BUILD_COUNT}"
            echo "retag_count=${RETAG_COUNT}"
            echo "prev_tag=${PREV_TAG}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Preflight refine"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Mode | \`${MODE}\` |"
            echo "| PREV_TAG | \`${PREV_TAG:-none}\` |"
            echo "| Build (final) | ${BUILD_COUNT} |"
            echo "| Retag (final) | ${RETAG_COUNT} |"
            if [[ "${#MOVED[@]}" -gt 0 ]]; then
              echo ""
              echo "Moved to build (missing PREV_TAG): ${MOVED[*]}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Final build_count=${BUILD_COUNT} retag_count=${RETAG_COUNT}"

  # ---------------------------------------------------------------------------
  # 4. build matrix — bake only services classified as changed (from source)
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    needs: [prepare, preflight]
    if: needs.preflight.outputs.build_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 21
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.build_services) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h

      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        # aws-actions/amazon-ecr-login@v2.1.6
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64

      - name: Set up QEMU
        # docker/setup-qemu-action@v4.2.0
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4.2.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
          buildkitd-config: ./buildkitd.toml

      - name: Build and push service
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEMO_VERSION: ${{ needs.prepare.outputs.version }}
          IMAGE_VERSION: ${{ needs.prepare.outputs.version }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          # Load Dockerfile paths and build args from committed .env.
          # Do NOT source .env.override (may point at the test registry).
          #
          # Critical: .env sets DEMO_VERSION=latest and a default IMAGE_NAME for
          # local Compose. Those must NOT clobber the immutable release identity
          # resolved by prepare (sha-<7> / v*) or the environment's IMAGE_NAME.
          # Previously `set -a; source .env` overwrote both, so images landed in
          # ECR only as :latest while verify-ecr looked for :sha-XXXXXXX.
          CI_IMAGE_NAME="${IMAGE_NAME}"
          CI_DEMO_VERSION="${DEMO_VERSION}"
          CI_IMAGE_VERSION="${IMAGE_VERSION}"

          set -a
          # shellcheck disable=SC1091
          source .env
          set +a

          # Override local Compose defaults from .env with the CI release identity.
          export IMAGE_NAME="${CI_IMAGE_NAME}"
          export DEMO_VERSION="${CI_DEMO_VERSION}"
          export IMAGE_VERSION="${CI_IMAGE_VERSION}"

          echo "Baking service=${SERVICE}"
          echo "  IMAGE_NAME=${IMAGE_NAME}"
          echo "  DEMO_VERSION=${DEMO_VERSION}"
          echo "  platforms=linux/amd64,linux/arm64 (from docker-bake.hcl)"
          echo "  cache=${IMAGE_NAME}/${SERVICE}:buildcache"
          echo "  runtime_tag=${IMAGE_NAME}/${SERVICE}:${DEMO_VERSION}"

          docker buildx bake -f docker-compose.yml -f docker-bake.hcl "${SERVICE}" --push

      - name: Job summary
        if: always()
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEMO_VERSION: ${{ needs.prepare.outputs.version }}
          SERVICE: ${{ matrix.service }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
        run: |
          {
            echo "## Build ${SERVICE}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Service | \`${SERVICE}\` |"
            echo "| Image | \`${IMAGE_NAME}/${SERVICE}:${DEMO_VERSION}\` |"
            echo "| Cache | \`${IMAGE_NAME}/${SERVICE}:buildcache\` |"
            echo "| Mode | bake from source |"
            echo "| Commit | \`${SHORT_SHA}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # 5. retag matrix — copy PREV_TAG → NEW_TAG for unchanged services (no source rebuild)
  # ---------------------------------------------------------------------------
  retag:
    name: Retag ${{ matrix.service }}
    needs: [prepare, preflight]
    if: needs.preflight.outputs.retag_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 21
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.retag_services) }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        # aws-actions/amazon-ecr-login@v2.1.6
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64

      - name: Set up Docker Buildx
        # docker/setup-buildx-action@v4.2.0
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Retag previous image to new global tag
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          NEW_TAG: ${{ needs.prepare.outputs.version }}
          PREV_TAG: ${{ needs.preflight.outputs.prev_tag }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          if [[ -z "${PREV_TAG}" ]]; then
            echo "::error::PREV_TAG is empty; cannot retag ${SERVICE}"
            exit 1
          fi
          if [[ "${PREV_TAG}" == "${NEW_TAG}" ]]; then
            echo "PREV_TAG equals NEW_TAG (${NEW_TAG}); ensuring tag exists via imagetools create (idempotent)."
          fi

          SRC="${IMAGE_NAME}/${SERVICE}:${PREV_TAG}"
          DST="${IMAGE_NAME}/${SERVICE}:${NEW_TAG}"
          echo "Retag ${SRC} → ${DST}"

          docker buildx imagetools create --tag "${DST}" "${SRC}"

          # Resolve digests for summary (best-effort).
          SRC_DIGEST="$(docker buildx imagetools inspect "${SRC}" --format '{{.Manifest.Digest}}' 2>/dev/null || echo unknown)"
          DST_DIGEST="$(docker buildx imagetools inspect "${DST}" --format '{{.Manifest.Digest}}' 2>/dev/null || echo unknown)"
          echo "src_digest=${SRC_DIGEST}"
          echo "dst_digest=${DST_DIGEST}"

      - name: Job summary
        if: always()
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          NEW_TAG: ${{ needs.prepare.outputs.version }}
          PREV_TAG: ${{ needs.preflight.outputs.prev_tag }}
          SERVICE: ${{ matrix.service }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
        run: |
          {
            echo "## Retag ${SERVICE}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Service | \`${SERVICE}\` |"
            echo "| Source | \`${IMAGE_NAME}/${SERVICE}:${PREV_TAG}\` |"
            echo "| Destination | \`${IMAGE_NAME}/${SERVICE}:${NEW_TAG}\` |"
            echo "| Mode | retag (no source rebuild) |"
            echo "| Commit | \`${SHORT_SHA}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # 6. verify ECR — all 21 tags under NEW_TAG after build and/or retag
  # ---------------------------------------------------------------------------
  verify-ecr:
    name: Verify ECR tags
    needs: [prepare, preflight, build, retag]
    # Continue when build or retag is skipped (empty matrix side); not when they fail.
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      needs.preflight.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.retag.result == 'success' || needs.retag.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ needs.prepare.outputs.target_environment }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        # aws-actions/configure-aws-credentials@v6.2.2
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Describe every promoted release tag
        env:
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          DEMO_VERSION: ${{ needs.prepare.outputs.version }}
          SERVICES_JSON: ${{ needs.prepare.outputs.services }}
        run: |
          set -euo pipefail
          PROJECT="${IMAGE_NAME#*/}"
          mapfile -t SERVICES < <(printf '%s' "${SERVICES_JSON}" | jq -r '.[]')

          MISSING=()
          FOUND=()
          {
            echo "## ECR verification for \`${DEMO_VERSION}\`"
            echo ""
            echo "| Service | Repository | Digest |"
            echo "|---|---|---|"
          } >> "${GITHUB_STEP_SUMMARY}"

          for svc in "${SERVICES[@]}"; do
            REPO="${PROJECT}/${svc}"
            if DESC="$(aws ecr describe-images \
              --repository-name "${REPO}" \
              --image-ids "imageTag=${DEMO_VERSION}" \
              --region "${AWS_REGION}" \
              --output json 2>/dev/null)"; then
              DIGEST="$(printf '%s' "${DESC}" | jq -r '.imageDetails[0].imageDigest // "unknown"')"
              FOUND+=("${svc}")
              echo "| \`${svc}\` | \`${REPO}\` | \`${DIGEST}\` |" >> "${GITHUB_STEP_SUMMARY}"
              echo "OK ${REPO}:${DEMO_VERSION} digest=${DIGEST}"
            else
              MISSING+=("${svc}")
              echo "| \`${svc}\` | \`${REPO}\` | **MISSING** |" >> "${GITHUB_STEP_SUMMARY}"
              echo "MISSING ${REPO}:${DEMO_VERSION}"
            fi
          done

          {
            echo ""
            echo "Found: ${#FOUND[@]} / ${#SERVICES[@]}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            echo "::error::Missing ECR images for tag ${DEMO_VERSION} (${#MISSING[@]}): ${MISSING[*]}"
            exit 1
          fi
          echo "All ${#SERVICES[@]} release images present for tag ${DEMO_VERSION}"

  # ---------------------------------------------------------------------------
  # 7. release-ready — sole gate for chart promotion (auto-dev or auto-prod PR)
  # ---------------------------------------------------------------------------
  release-ready:
    name: Release ready
    if: always()
    needs: [ci, prepare, preflight, build, retag, verify-ecr]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Evaluate release gate
        env:
          CI_RESULT: ${{ needs.ci.result }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          RETAG_RESULT: ${{ needs.retag.result }}
          VERIFY_RESULT: ${{ needs.verify-ecr.result }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          TARGET_ENV: ${{ needs.prepare.outputs.target_environment }}
          SERVICE_COUNT: ${{ needs.prepare.outputs.service_count }}
          MODE: ${{ needs.prepare.outputs.mode }}
          BUILD_COUNT: ${{ needs.preflight.outputs.build_count }}
          RETAG_COUNT: ${{ needs.preflight.outputs.retag_count }}
        run: |
          set -euo pipefail
          {
            echo "## Release-ready gate"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| ci | \`${CI_RESULT}\` |"
            echo "| prepare | \`${PREPARE_RESULT}\` |"
            echo "| preflight | \`${PREFLIGHT_RESULT}\` |"
            echo "| build | \`${BUILD_RESULT}\` |"
            echo "| retag | \`${RETAG_RESULT}\` |"
            echo "| verify-ecr | \`${VERIFY_RESULT}\` |"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${TARGET_ENV}\` |"
            echo "| Tag | \`${VERSION}\` |"
            echo "| Commit | \`${SHORT_SHA}\` |"
            echo "| Services | \`${SERVICE_COUNT}\` |"
            echo "| Mode | \`${MODE}\` |"
            echo "| Build count | \`${BUILD_COUNT}\` |"
            echo "| Retag count | \`${RETAG_COUNT}\` |"
            echo ""
            if [[ "${TARGET_ENV}" == "development" ]]; then
              echo "On success, **update-chart-dev** will direct-push \`default.image.tag\` to the chart repo."
            else
              echo "On success, **create-chart-prod-pr** will open a chart PR for \`values-prod.yaml\` (merge still required)."
            fi
            echo "This workflow does **not** deploy Helm resources or merge production chart PRs."
          } >> "${GITHUB_STEP_SUMMARY}"

          FAILED=0
          # build/retag may be skipped when that side of the selective plan is empty.
          for pair in "ci:${CI_RESULT}:strict" "prepare:${PREPARE_RESULT}:strict" "preflight:${PREFLIGHT_RESULT}:strict" "build:${BUILD_RESULT}:allow_skip" "retag:${RETAG_RESULT}:allow_skip" "verify-ecr:${VERIFY_RESULT}:strict"; do
            name="${pair%%:*}"
            rest="${pair#*:}"
            result="${rest%%:*}"
            mode="${rest#*:}"
            if [[ "${mode}" == "allow_skip" ]]; then
              if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
                echo "::error::Release gate failed: job '${name}' result='${result}' (want success|skipped)"
                FAILED=1
              fi
            else
              if [[ "${result}" != "success" ]]; then
                echo "::error::Release gate failed: job '${name}' result='${result}' (want success)"
                FAILED=1
              fi
            fi
          done

          # At least one path must produce images (safety against both sides skipped).
          if [[ "${BUILD_RESULT}" == "skipped" && "${RETAG_RESULT}" == "skipped" ]]; then
            echo "::error::Both build and retag were skipped; no images published for tag ${VERSION}"
            FAILED=1
          fi

          if [[ "${FAILED}" -ne 0 ]]; then
            echo "Release is NOT ready. Do not promote chart values."
            exit 1
          fi

          echo "Release is ready (tag=${VERSION}, env=${TARGET_ENV}, mode=${MODE})."

  # ---------------------------------------------------------------------------
  # 8. update-chart-dev — direct-push image tag to chart values-dev.yaml
  #    Runs only after release-ready succeeds for the development environment.
  #    Requires repository secret CHART_REPO_TOKEN (contents:write on chart repo).
  # ---------------------------------------------------------------------------
  update-chart-dev:
    name: Update chart values-dev tag
    needs: [prepare, release-ready]
    if: >
      needs.release-ready.result == 'success' &&
      needs.prepare.outputs.target_environment == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Override via repository variables if remotes/branch names differ.
      CHART_REPO: ${{ vars.CHART_REPO || 'tf2-team/tf2-corp-chart' }}
      CHART_BRANCH: ${{ vars.CHART_BRANCH || 'techx-dev-corp' }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      PLATFORM_SHA: ${{ github.sha }}
      PLATFORM_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Require CHART_REPO_TOKEN
        env:
          CHART_REPO_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CHART_REPO_TOKEN}" ]]; then
            echo "::error::Secret CHART_REPO_TOKEN is not set. Create a fine-grained PAT (or classic PAT) with contents:write on ${CHART_REPO}, add it as a repository secret, then re-run. See docs/CICD.md."
            exit 1
          fi

      - name: Checkout chart repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ env.CHART_REPO }}
          ref: ${{ env.CHART_BRANCH }}
          token: ${{ secrets.CHART_REPO_TOKEN }}
          path: chart
          # Fetch enough history for rebase retries against concurrent pushes.
          fetch-depth: 20

      - name: Update default.image.tag and push
        working-directory: chart
        run: |
          set -euo pipefail

          FILE="values-dev.yaml"
          if [[ ! -f "${FILE}" ]]; then
            echo "::error::${FILE} not found in ${CHART_REPO}@${CHART_BRANCH}"
            exit 1
          fi

          # Precise in-place update of default.image.tag only (preserve comments/layout).
          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          path = Path("values-dev.yaml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["VERSION"]

          pattern = re.compile(
              r"(^default:\n"
              r"  image:\n"
              r"    repository:[^\n]+\n"
              r"(?:    #[^\n]*\n)*"
              r"    tag:\s*)\"[^\"]*\"",
              re.MULTILINE,
          )
          match = pattern.search(text)
          if not match:
              print(
                  "::error::Could not locate default.image.tag under default.image in values-dev.yaml",
                  file=sys.stderr,
              )
              sys.exit(1)

          current_match = re.search(r'tag:\s*"([^"]*)"', match.group(0))
          current = current_match.group(1) if current_match else ""
          print(f"current_tag={current}")
          print(f"new_tag={version}")

          if current == version:
              Path(".tag-unchanged").write_text("1", encoding="utf-8")
              print("Tag already up to date; no commit needed.")
              sys.exit(0)

          new_text, n = pattern.subn(rf'\1"{version}"', text, count=1)
          if n != 1:
              print(f"::error::Expected 1 replacement, got {n}", file=sys.stderr)
              sys.exit(1)

          path.write_text(new_text, encoding="utf-8")
          print(f"Updated default.image.tag: {current} → {version}")
          PY

          if [[ -f .tag-unchanged ]]; then
            {
              echo "## Chart values-dev update"
              echo ""
              echo "No change: \`default.image.tag\` already \`${VERSION}\` on \`${CHART_REPO}@${CHART_BRANCH}\`."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${FILE}"
          if git diff --cached --quiet; then
            echo "Working tree clean after update; nothing to commit."
            exit 0
          fi

          git commit -m "chore(dev): promote image tag to ${VERSION}" \
            -m "Automated by platform build after release-ready." \
            -m "Platform commit: ${PLATFORM_SHA}" \
            -m "Workflow: ${PLATFORM_RUN_URL}"

          # checkout action already configured origin with CHART_REPO_TOKEN credentials.
          # Retry push with rebase if another bot/human commit landed first.
          ATTEMPTS=5
          for attempt in $(seq 1 "${ATTEMPTS}"); do
            if git push origin "HEAD:${CHART_BRANCH}"; then
              echo "Pushed default.image.tag=${VERSION} to ${CHART_REPO}@${CHART_BRANCH}"
              {
                echo "## Chart values-dev update"
                echo ""
                echo "| Field | Value |"
                echo "|---|---|"
                echo "| Repository | \`${CHART_REPO}\` |"
                echo "| Branch | \`${CHART_BRANCH}\` |"
                echo "| File | \`values-dev.yaml\` |"
                echo "| Tag | \`${VERSION}\` |"
                echo "| Mode | direct push |"
                echo ""
                echo "Argo CD (\`techx-corp-dev\`) will auto-sync after this commit lands."
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}/${ATTEMPTS}); pulling with rebase..."
            git fetch origin "${CHART_BRANCH}"
            git rebase "origin/${CHART_BRANCH}"

            # Re-apply tag after rebase in case remote also touched values-dev.yaml.
            python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          path = Path("values-dev.yaml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["VERSION"]
          pattern = re.compile(
              r"(^default:\n"
              r"  image:\n"
              r"    repository:[^\n]+\n"
              r"(?:    #[^\n]*\n)*"
              r"    tag:\s*)\"[^\"]*\"",
              re.MULTILINE,
          )
          if not pattern.search(text):
              print("::error::values-dev.yaml lost default.image.tag after rebase", file=sys.stderr)
              sys.exit(1)
          path.write_text(pattern.sub(rf'\1"{version}"', text, count=1), encoding="utf-8")
          PY
            git add "${FILE}"
            if ! git diff --cached --quiet; then
              # Keep a single promote commit on top after resolving concurrent updates.
              git commit --amend --no-edit
            fi
          done

          echo "::error::Failed to push to ${CHART_REPO}@${CHART_BRANCH} after ${ATTEMPTS} attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # 9. create-chart-prod-pr — open PR to update chart values-prod.yaml tag
  #    Runs only after release-ready succeeds for the production environment.
  #    Does not merge; human review remains the production deploy gate.
  #    Requires repository secret CHART_REPO_TOKEN (Contents + Pull requests write).
  # ---------------------------------------------------------------------------
  create-chart-prod-pr:
    name: Create chart values-prod PR
    needs: [prepare, release-ready]
    if: >
      needs.release-ready.result == 'success' &&
      needs.prepare.outputs.target_environment == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Override via repository variables if remotes/branch names differ.
      CHART_REPO: ${{ vars.CHART_REPO || 'tf2-team/tf2-corp-chart' }}
      CHART_PROD_BRANCH: ${{ vars.CHART_PROD_BRANCH || 'main' }}
      VERSION: ${{ needs.prepare.outputs.version }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      PLATFORM_SHA: ${{ github.sha }}
      PLATFORM_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PLATFORM_REPO: ${{ github.repository }}
    steps:
      - name: Require CHART_REPO_TOKEN
        env:
          CHART_REPO_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CHART_REPO_TOKEN}" ]]; then
            echo "::error::Secret CHART_REPO_TOKEN is not set. Create a fine-grained PAT with Contents: Read and write and Pull requests: Read and write on ${CHART_REPO}, add it as a repository secret, then re-run. See docs/CICD.md."
            exit 1
          fi

      - name: Checkout chart repository
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ env.CHART_REPO }}
          ref: ${{ env.CHART_PROD_BRANCH }}
          token: ${{ secrets.CHART_REPO_TOKEN }}
          path: chart
          fetch-depth: 20

      - name: Update values-prod tag, push branch, open PR
        working-directory: chart
        env:
          GH_TOKEN: ${{ secrets.CHART_REPO_TOKEN }}
        run: |
          set -euo pipefail

          FILE="values-prod.yaml"
          if [[ ! -f "${FILE}" ]]; then
            echo "::error::${FILE} not found in ${CHART_REPO}@${CHART_PROD_BRANCH}"
            exit 1
          fi

          # Sanitize version for a valid git branch segment (e.g. v1.2.3 or sha-a1b2c3d).
          SAFE_VERSION="$(printf '%s' "${VERSION}" | tr -c 'A-Za-z0-9._-' '-')"
          PROMOTE_BRANCH="promote/prod-image-${SAFE_VERSION}"

          # Precise in-place update of default.image.tag only (preserve comments/layout).
          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          path = Path("values-prod.yaml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["VERSION"]

          pattern = re.compile(
              r"(^default:\n"
              r"  image:\n"
              r"    repository:[^\n]+\n"
              r"(?:    #[^\n]*\n)*"
              r"    tag:\s*)\"[^\"]*\"",
              re.MULTILINE,
          )
          match = pattern.search(text)
          if not match:
              print(
                  "::error::Could not locate default.image.tag under default.image in values-prod.yaml",
                  file=sys.stderr,
              )
              sys.exit(1)

          current_match = re.search(r'tag:\s*"([^"]*)"', match.group(0))
          current = current_match.group(1) if current_match else ""
          print(f"current_tag={current}")
          print(f"new_tag={version}")

          if current == version:
              Path(".tag-unchanged").write_text("1", encoding="utf-8")
              print("Tag already up to date; no PR needed.")
              sys.exit(0)

          new_text, n = pattern.subn(rf'\1"{version}"', text, count=1)
          if n != 1:
              print(f"::error::Expected 1 replacement, got {n}", file=sys.stderr)
              sys.exit(1)

          path.write_text(new_text, encoding="utf-8")
          Path(".previous-tag").write_text(current, encoding="utf-8")
          print(f"Updated default.image.tag: {current} → {version}")
          PY

          if [[ -f .tag-unchanged ]]; then
            {
              echo "## Chart values-prod PR"
              echo ""
              echo "No change: \`default.image.tag\` already \`${VERSION}\` on \`${CHART_REPO}@${CHART_PROD_BRANCH}\`."
              echo "Skipped branch push and PR creation."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          PREVIOUS_TAG="unknown"
          if [[ -f .previous-tag ]]; then
            PREVIOUS_TAG="$(cat .previous-tag)"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${PROMOTE_BRANCH}"

          git add "${FILE}"
          if git diff --cached --quiet; then
            echo "Working tree clean after update; nothing to commit."
            exit 0
          fi

          git commit -m "chore(prod): promote image tag to ${VERSION}" \
            -m "Automated PR by platform build after release-ready." \
            -m "Platform commit: ${PLATFORM_SHA}" \
            -m "Workflow: ${PLATFORM_RUN_URL}"

          # Bot promote branches are disposable per tag; force refresh on re-runs.
          git push --force origin "HEAD:${PROMOTE_BRANCH}"

          PR_TITLE="chore(prod): promote image tag to ${VERSION}"
          # Body file keeps YAML/script indentation out of the heredoc delimiter.
          {
            echo "## Summary"
            echo ""
            echo "Promote production Helm image tag after a successful platform image publish."
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| File | \`${FILE}\` |"
            echo "| Previous tag | \`${PREVIOUS_TAG}\` |"
            echo "| New tag | \`${VERSION}\` |"
            echo "| Base branch | \`${CHART_PROD_BRANCH}\` |"
            echo "| Platform repo | \`${PLATFORM_REPO}\` |"
            echo "| Platform commit | \`${PLATFORM_SHA}\` |"
            echo "| Platform workflow | ${PLATFORM_RUN_URL} |"
            echo ""
            echo "## Notes"
            echo ""
            echo "* All **21** release images were built and verified in ECR before this PR was opened."
            echo "* Merge this PR to let Argo CD Application \`techx-corp\` sync the new global tag."
            echo "* Do **not** merge while a platform publish for this tag is still in progress (this job only runs after \`release-ready\`)."
            echo ""
            echo "## Validation after merge"
            echo ""
            echo '```cmd'
            echo "argocd app wait techx-corp --sync --health --timeout 600"
            echo '```'
          } > /tmp/chart-prod-pr-body.md

          # Idempotent: reuse an existing open PR for this head branch when present.
          # Prefer owner:branch for --head so gh matches the chart repo owner reliably.
          CHART_OWNER="${CHART_REPO%%/*}"
          HEAD_REF="${CHART_OWNER}:${PROMOTE_BRANCH}"
          EXISTING_URL="$(
            gh pr list \
              --repo "${CHART_REPO}" \
              --head "${HEAD_REF}" \
              --base "${CHART_PROD_BRANCH}" \
              --state open \
              --json url \
              --jq '.[0].url // empty'
          )"

          MANUAL_PR_URL="https://github.com/${CHART_REPO}/compare/${CHART_PROD_BRANCH}...${PROMOTE_BRANCH}?expand=1"

          if [[ -n "${EXISTING_URL}" ]]; then
            echo "Updated existing PR: ${EXISTING_URL}"
            if ! gh pr edit "${EXISTING_URL}" --repo "${CHART_REPO}" \
              --title "${PR_TITLE}" \
              --body-file /tmp/chart-prod-pr-body.md; then
              echo "::error::Failed to update existing PR. Ensure CHART_REPO_TOKEN fine-grained PAT has Pull requests: Read and write on ${CHART_REPO}. Branch already pushed: ${PROMOTE_BRANCH}. Manual open: ${MANUAL_PR_URL}"
              exit 1
            fi
            PR_URL="${EXISTING_URL}"
          else
            set +e
            PR_URL="$(
              gh pr create \
                --repo "${CHART_REPO}" \
                --base "${CHART_PROD_BRANCH}" \
                --head "${PROMOTE_BRANCH}" \
                --title "${PR_TITLE}" \
                --body-file /tmp/chart-prod-pr-body.md \
                2> /tmp/gh-pr-create.err
            )"
            PR_CREATE_RC=$?
            set -e
            if [[ "${PR_CREATE_RC}" -ne 0 ]]; then
              cat /tmp/gh-pr-create.err >&2 || true
              {
                echo "::error::Failed to create chart PR (often GraphQL: Resource not accessible by personal access token)."
                echo "::error::Fix: regenerate/edit the fine-grained PAT used as CHART_REPO_TOKEN with repository permissions:"
                echo "::error::  - Contents: Read and write"
                echo "::error::  - Pull requests: Read and write"
                echo "::error::Then update the platform repo secret CHART_REPO_TOKEN and re-run this job."
                echo "::error::Branch already pushed: ${PROMOTE_BRANCH}"
                echo "::error::Manual PR (until PAT is fixed): ${MANUAL_PR_URL}"
              }
              exit 1
            fi
            echo "Opened PR: ${PR_URL}"
          fi

          {
            echo "## Chart values-prod PR"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Repository | \`${CHART_REPO}\` |"
            echo "| Base branch | \`${CHART_PROD_BRANCH}\` |"
            echo "| Head branch | \`${PROMOTE_BRANCH}\` |"
            echo "| File | \`${FILE}\` |"
            echo "| Previous tag | \`${PREVIOUS_TAG}\` |"
            echo "| Tag | \`${VERSION}\` |"
            echo "| Mode | pull request (no auto-merge) |"
            echo "| PR | ${PR_URL} |"
            echo ""
            echo "Review and merge the PR to deploy. Argo CD (\`techx-corp\`) will sync after merge to \`${CHART_PROD_BRANCH}\`."
          } >> "${GITHUB_STEP_SUMMARY}"
