name: Audit alert parser tests

on:
  pull_request:
    branches: [main, techx-dev-corp]
    paths:
      - "src/audit-alert-parser/**"
      - ".github/workflows/audit-alert-parser-tests.yml"
  workflow_dispatch:

concurrency:
  group: audit-alert-parser-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/audit-alert-parser
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/audit-alert-parser/pyproject.toml

      - name: Install parser test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run parser unit tests
        run: python -m pytest -q -p no:cacheprovider
