syntax = "proto3";

package oteldemo;

option go_package = "genproto/oteldemo";

// -----------------Cart service-----------------

service CartService {
    rpc AddItem(AddItemRequest) returns (Empty) {}
    rpc GetCart(GetCartRequest) returns (Cart) {}
    rpc EmptyCart(EmptyCartRequest) returns (Empty) {}
}

message CartItem {
    string product_id = 1;
    int32  quantity = 2;
}

message AddItemRequest {
    string user_id = 1;
    CartItem item = 2;
}

message EmptyCartRequest {
    string user_id = 1;
}

message GetCartRequest {
    string user_id = 1;
}

message Cart {
    string user_id = 1;
    repeated CartItem items = 2;
}

message Empty {}

// ---------------Recommendation service----------

service RecommendationService {
  rpc ListRecommendations(ListRecommendationsRequest) returns (ListRecommendationsResponse){}
}

message ListRecommendationsRequest {
    string user_id = 1;
    repeated string product_ids = 2;
}

message ListRecommendationsResponse {
    repeated string product_ids = 1;
}

// ---------------Product Catalog----------------

service ProductCatalogService {
    rpc ListProducts(Empty) returns (ListProductsResponse) {}
    rpc GetProduct(GetProductRequest) returns (Product) {}
    rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse) {}
}

message Product {
    string id = 1;
    string name = 2;
    string description = 3;
    string picture = 4;
    Money price_usd = 5;

    // Categories such as "clothing" or "kitchen" that can be used to look up
    // other related products.
    repeated string categories = 6;
}

message ListProductsResponse {
    repeated Product products = 1;
}

message GetProductRequest {
    string id = 1;
}

message SearchProductsRequest {
    string query = 1;
    // Structured filter fields for Shopping Copilot (A2.1).
    // All optional — omit to get unfiltered results.
    optional int64 max_price_units = 2;  // whole currency units (e.g. USD)
    optional int32 max_price_nanos = 3;  // nano units (10^-9)
    optional string category = 4;        // must match one of Product.categories exactly
}

message SearchProductsResponse {
    repeated Product results = 1;
}

// ---------------Shopping Copilot service----------

service ShoppingCopilotService {
    // Single-turn: parse intent, search catalog, optionally ground Q&A on reviews.
    rpc Search(CopilotSearchRequest) returns (CopilotSearchResponse) {}
    // Separate confirmation RPC: validate pending token and write to cart.
    // AI never calls this — only the frontend (user-triggered) does.
    rpc ConfirmCartAction(ConfirmCartActionRequest) returns (ConfirmCartActionResponse) {}
}

message CopilotSearchRequest {
    string user_message = 1;
    // session_id is reserved for A2.4 (multi-turn) — omit in current MVP.
}

message CopilotSearchResponse {
    // One of: GROUNDED | NO_RESULTS | ABSTAINED | BLOCKED | FALLBACK
    string status = 1;
    // Human-readable summary of what the copilot understood from the user query.
    string interpreted_criteria = 2;
    repeated CopilotProduct products = 3;
    repeated CopilotClaim claims = 4;
    repeated CopilotSource sources = 5;
    // Explanation when status is not GROUNDED (e.g. abstention or fallback reason).
    string reason = 6;
    // Non-empty when the copilot proposes an add-to-cart action.
    // Frontend must call ConfirmCartAction with this token to execute the write.
    string pending_action_token = 7;
}

message CopilotProduct {
    string product_id = 1;
    string name = 2;
    int64 price_units = 3;
    int32 price_nanos = 4;
    string currency_code = 5;
}

message CopilotClaim {
    string text = 1;
    repeated string source_ids = 2;
}

message CopilotSource {
    string source_id = 1;
    // "catalog" for product facts, "review" for review-grounded claims.
    string source_type = 2;
    string product_id = 3;
    string username = 4;
    float score = 5;
    string description = 6;
}

message ConfirmCartActionRequest {
    string pending_action_token = 1;
    string user_id = 2;
}

message ConfirmCartActionResponse {
    bool success = 1;
    // Human-readable reason on failure (expired, replayed, invalid token, etc.).
    string reason = 2;
}

// ---------------Product Review service----------

service ProductReviewService {
  rpc GetProductReviews(GetProductReviewsRequest) returns (GetProductReviewsResponse){}
  rpc GetAverageProductReviewScore(GetAverageProductReviewScoreRequest) returns (GetAverageProductReviewScoreResponse){}
  rpc AskProductAIAssistant(AskProductAIAssistantRequest) returns (AskProductAIAssistantResponse){}
}

message ProductReview {
    string username = 1;
    string description = 2;
    string score = 3;
    string id = 4;
}

message GetProductReviewsRequest {
    string product_id = 1;
}

message GetProductReviewsResponse {
    repeated ProductReview product_reviews = 1;
}

message GetAverageProductReviewScoreRequest {
    string product_id = 1;
}

message GetAverageProductReviewScoreResponse {
    string average_score = 1;
}

message AskProductAIAssistantRequest {
    string product_id = 1;
    string question = 2;
}

message GroundedClaim {
    string text = 1;
    repeated string source_ids = 2;
}

message AskProductAIAssistantResponse {
    string response = 1;
    string status = 2;
    string reason = 3;
    repeated GroundedClaim claims = 4;
}

// ---------------Shipping Service----------

service ShippingService {
    rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse) {}
    rpc ShipOrder(ShipOrderRequest) returns (ShipOrderResponse) {}
}

message GetQuoteRequest {
    Address address = 1;
    repeated CartItem items = 2;
}

message GetQuoteResponse {
    Money cost_usd = 1;
}

message ShipOrderRequest {
    Address address = 1;
    repeated CartItem items = 2;
}

message ShipOrderResponse {
    string tracking_id = 1;
}

message Address {
    string street_address = 1;
    string city = 2;
    string state = 3;
    string country = 4;
    string zip_code = 5;
}

// -----------------Currency service-----------------

service CurrencyService {
    rpc GetSupportedCurrencies(Empty) returns (GetSupportedCurrenciesResponse) {}
    rpc Convert(CurrencyConversionRequest) returns (Money) {}
}

// Represents an amount of money with its currency type.
message Money {
    // The 3-letter currency code defined in ISO 4217.
    string currency_code = 1;

    // The whole units of the amount.
    // For example if `currencyCode` is `"USD"`, then 1 unit is one US dollar.
    int64 units = 2;

    // Number of nano (10^-9) units of the amount.
    // The value must be between -999,999,999 and +999,999,999 inclusive.
    // If `units` is positive, `nanos` must be positive or zero.
    // If `units` is zero, `nanos` can be positive, zero, or negative.
    // If `units` is negative, `nanos` must be negative or zero.
    // For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
    int32 nanos = 3;
}

message GetSupportedCurrenciesResponse {
    // The 3-letter currency code defined in ISO 4217.
    repeated string currency_codes = 1;
}

message CurrencyConversionRequest {
    Money from = 1;

    // The 3-letter currency code defined in ISO 4217.
    string to_code = 2;
}

// -------------Payment service-----------------

service PaymentService {
    rpc Charge(ChargeRequest) returns (ChargeResponse) {}
}

message CreditCardInfo {
    string credit_card_number = 1;
    int32 credit_card_cvv = 2;
    int32 credit_card_expiration_year = 3;
    int32 credit_card_expiration_month = 4;
}

message ChargeRequest {
    Money amount = 1;
    CreditCardInfo credit_card = 2;
}

message ChargeResponse {
    string transaction_id = 1;
}

// -------------Email service-----------------

service EmailService {
    rpc SendOrderConfirmation(SendOrderConfirmationRequest) returns (Empty) {}
}

message OrderItem {
    CartItem item = 1;
    Money cost = 2;
}

message OrderResult {
    string   order_id = 1;
    string   shipping_tracking_id = 2;
    Money shipping_cost = 3;
    Address  shipping_address = 4;
    repeated OrderItem items = 5;
}

message SendOrderConfirmationRequest {
    string email = 1;
    OrderResult order = 2;
}


// -------------Checkout service-----------------

service CheckoutService {
    rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse) {}
}

message PlaceOrderRequest {
    string user_id = 1;
    string user_currency = 2;

    Address address = 3;
    string email = 5;
    CreditCardInfo credit_card = 6;
}

message PlaceOrderResponse {
    OrderResult order = 1;
}

// ------------Ad service------------------

service AdService {
    rpc GetAds(AdRequest) returns (AdResponse) {}
}

message AdRequest {
    // List of important key words from the current page describing the context.
    repeated string context_keys = 1;
}

message AdResponse {
    repeated Ad ads = 1;
}

message Ad {
    // url to redirect to when an ad is clicked.
    string redirect_url = 1;

    // short advertisement text to display.
    string text = 2;
}

// ------------Feature flag service------------------

service FeatureFlagService {
  rpc GetFlag(GetFlagRequest) returns (GetFlagResponse) {}
  rpc CreateFlag(CreateFlagRequest) returns (CreateFlagResponse) {}
  rpc UpdateFlag(UpdateFlagRequest) returns (UpdateFlagResponse) {}
  rpc ListFlags(ListFlagsRequest) returns (ListFlagsResponse) {}
  rpc DeleteFlag(DeleteFlagRequest) returns (DeleteFlagResponse) {}
}

message Flag {
  string name = 1;
  string description = 2;
  bool enabled = 3;
}

message GetFlagRequest {
  string name = 1;
}

message GetFlagResponse {
  Flag flag = 1;
}

message CreateFlagRequest {
  string name = 1;
  string description = 2;
  bool enabled = 3;
}

message CreateFlagResponse {
  Flag flag = 1;
}

message UpdateFlagRequest {
  string name = 1;
  bool enabled = 2;
}

message UpdateFlagResponse {}

message ListFlagsRequest {}

message ListFlagsResponse {
  repeated Flag flag = 1;
}

message DeleteFlagRequest {
  string name = 1;
}

message DeleteFlagResponse {}

message OrderCancelled {
    string order_id = 1;
    string reason = 2;
}

